  frag.appendChild(feedCard);
  return frag;
}

function detailHTML(f){
  if(f.kind==="gym"){
    const g=f.raw;
    let lines;
    if(g.exercises){
      lines=g.exercises.map(e=>{
        const bands=e.lines.map(l=>`${l.s||1} × ${esc(l.r||"–")} @ ${l.w>0?l.w+"kg":"BW"}`).join("  ·  ");
        return `<div class="dl"><span>${esc(e.nm)}</span><span class="figure">${bands}</span></div>`;
      }).join("");
    }else{
      lines=(g.sets||[]).map(s=>`<div class="dl"><span>${esc(s.nm)}</span><span class="figure">${s.w>0?s.w+" kg":"BW"} × ${esc(s.r||"–")}</span></div>`).join("");
    }
    return `<div class="dl-head">${esc(GYMALL()[g.day]?GYMALL()[g.day].name:g.day)} · ${fmtFull(g.date)}</div>${lines}${g.notes?`<div class="dl-note">${esc(g.notes)}</div>`:""}`;
  }
  if(f.kind==="mob"){
    const m=f.raw;
    const rows=[["Session",m.sess&&m.sess!=="custom"?m.sess:""],["Focus",m.focus],["Duration",m.dur?m.dur+" min":""],["Knee-to-wall L",m.ktwL?m.ktwL+" cm":""],["Knee-to-wall R",m.ktwR?m.ktwR+" cm":""],["Pistol stage",m.stage&&!m.stage.startsWith("—")?m.stage:""],["Popliteus",m.popliteus?"discomfort flagged"+(m.popnote?" — "+m.popnote:""):""]].filter(r=>r[1]);
    return `<div class="dl-head">${fmtFull(m.date)}</div>`+rows.map(r=>`<div class="dl"><span>${r[0]}</span><span class="figure" style="text-align:right">${esc(String(r[1]))}</span></div>`).join("")+(m.notes?`<div class="dl-note">${esc(m.notes)}</div>`:"");
  }
  const e=f.raw;
  const rows=[["Discipline",e.disc],["Type",e.type],["Distance / detail",e.summary],["Time",e.time],["RPE",e.rpe?e.rpe+" / 10":""]].filter(r=>r[1]);
  return `<div class="dl-head">${fmtFull(e.date)}</div>`+rows.map(r=>`<div class="dl"><span>${r[0]}</span><span class="figure">${esc(String(r[1]))}</span></div>`).join("")+(e.notes?`<div class="dl-note">${esc(e.notes)}</div>`:"");
}

/* =====================================================================
   MONEY MODULE — buffer → goal pots → invest waterfall,
   plus a per-transaction spending tracker with buckets.
   ===================================================================== */
function M(){return state.money}
function sortedGoals(){return [...M().goals].sort((a,b)=>(a.priority??0)-(b.priority??0))}
function bucketBudgetTotal(){return M().buckets.reduce((s,b)=>s+num(b.budget),0)}
function monthKeyOf(dateStr){return (dateStr||"").slice(0,7)}
function viewedMonth(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+monthOffset);return d}
function viewedMonthKey(){const d=viewedMonth();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`}
function spentIn(monKey,bucketId){
  return M().spend.filter(s=>monthKeyOf(s.date)===monKey&&(bucketId===undefined||s.bucketId===bucketId)).reduce((t,s)=>t+num(s.amount),0);
}
function monthsUntil(dateStr){
  const now=new Date(todayISO()+"T00:00:00"), d=new Date(dateStr+"T00:00:00");
  return Math.max(0,(d-now)/(1000*60*60*24*30.44));
}
function requiredMonthly(g){
  const remaining=Math.max(0,num(g.target)-num(g.saved));
  if(remaining<=0)return 0;
  const m=monthsUntil(g.deadline);
  return remaining/Math.max(1,m);
}
function paceDelta(g){
  if(!g.created||!g.deadline)return null;
  const c=new Date(g.created+"T00:00:00"),d=new Date(g.deadline+"T00:00:00"),n=new Date(todayISO()+"T00:00:00");
  const total=d-c;if(total<=0)return null;
  const frac=Math.min(1,Math.max(0,(n-c)/total));
  const initial=num(g.initial);
  const onTrack=initial+(num(g.target)-initial)*frac;
  return num(g.saved)-onTrack;
}
function recentPaceProjection(g){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-92);
  const cIso=cutoff.toISOString().slice(0,10);
  const contrib=M().paychecks.filter(p=>p.date>=cIso).reduce((t,p)=>t+num((p.toGoals||{})[g.id]),0);
  const avg=contrib/3;
  const remaining=Math.max(0,num(g.target)-num(g.saved));
  if(avg<=0||remaining<=0)return null;
  const months=remaining/avg;
  if(months>120)return null;
  const d=new Date();d.setMonth(d.getMonth()+Math.ceil(months));
  return {avg,when:fmtMonYr(d)};
}
function computeWaterfall(pay){
  const m=M();
  const out=bucketBudgetTotal();
  const toExpenses=Math.min(pay,out);
  const surplus=Math.max(0,pay-out);
  let rem=surplus;
  const bufNeed=Math.max(0,m.bufferTarget-m.bufferBalance);
  let toBuffer=wfOverride.buffer!==undefined?Math.min(Math.max(0,num(wfOverride.buffer)),rem):Math.min(rem,bufNeed);
  rem-=toBuffer;
  const toGoals={};
  sortedGoals().forEach(g=>{
    const remTarget=Math.max(0,num(g.target)-num(g.saved));
    const ov=wfOverride["g:"+g.id];
    const c=ov!==undefined?Math.min(Math.max(0,num(ov)),rem,remTarget):Math.min(rem,remTarget,requiredMonthly(g));
    toGoals[g.id]=c;rem-=c;
  });
  return {out,toExpenses,surplus,toBuffer,toGoals,toInvest:rem,shortfall:Math.max(0,out-pay)};
}

function renderMoney(root){
  const m=M();
  const secured=m.bufferBalance>=m.bufferTarget;
  const pct=Math.min(100,m.bufferTarget>0?(m.bufferBalance/m.bufferTarget)*100:100);
  const goalsSaved=m.goals.reduce((t,g)=>t+num(g.saved),0);
  const monKey=viewedMonthKey();
  const thisMonKey=todayISO().slice(0,7);
  const spentThisMonth=spentIn(thisMonKey);

  root.appendChild(el(`<div>
    <header>
      <div>
        <h1>Personal Finance</h1>
        <p>${secured?"Buffer secured — surplus flows down the waterfall: goals first, invest with the rest.":`Filling the ${gbp(m.bufferTarget)} safety buffer first — goals and investing come after.`}</p>
      </div>
      <div class="countdown">
        <div class="big" style="font-size:clamp(24px,5.5vw,36px)">${gbp(spentThisMonth)}</div>
        <div class="lbl">spent this month</div>
      </div>
    </header>

    <div class="m-hero">
      <div class="pot">
        <div class="eyebrow"><span class="tag" style="background:var(--buffer)"></span>Safety buffer</div>
        <div class="figure">${gbp(m.bufferBalance)} <span style="font-size:14px;color:var(--ink-faint)">/ ${gbp(m.bufferTarget)}</span></div>
        <div class="bar ${secured?"gold":""}"><span style="width:${pct}%"></span></div>
        <div class="bar-row"><span>${pct.toFixed(0)}% there</span><span>${secured?"Complete":gbp(Math.max(0,m.bufferTarget-m.bufferBalance))+" to go"}</span></div>
      </div>
      <div class="pot invest">
        <div class="eyebrow"><span class="tag" style="background:var(--invest)"></span>Goal pots + invested</div>
        <div class="figure">${gbp(goalsSaved+m.investBalance)}</div>
        <div class="sub">${gbp(goalsSaved)} in ${m.goals.length||"no"} goal pot${m.goals.length===1?"":"s"} · ${gbp(m.investBalance)} invested</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab ${mTab==="spend"?"on":""}" data-tab="spend">Spending</button>
      <button class="tab ${mTab==="pay"?"on":""}" data-tab="pay">Payday</button>
      <button class="tab ${mTab==="goals"?"on":""}" data-tab="goals">Goals &amp; pots</button>
    </div>
    <div id="mPanel"></div>
  </div>`));

  root.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{mTab=b.dataset.tab;render()});
  const p=root.querySelector("#mPanel");
  if(mTab==="spend")p.appendChild(spendView());
  else if(mTab==="pay")p.appendChild(payView());
  else p.appendChild(goalsView());
}

/* ---------- SPENDING ---------- */
function spendView(){
  const m=M();
  const frag=document.createDocumentFragment();
  const monKey=viewedMonthKey();
  const isCurrent=monthOffset===0;
  const pmD=viewedMonth();pmD.setMonth(pmD.getMonth()-1);
  const prevMonKey=`${pmD.getFullYear()}-${String(pmD.getMonth()+1).padStart(2,"0")}`;
  const unplanned=m.spend.filter(x=>monthKeyOf(x.date)===monKey&&x.planned===false).reduce((t,x)=>t+num(x.amount),0);

  /* quick add — the daily habit: log it right after you spend it */
  const add=el(`<div class="card">
    <h2>Log a spend</h2>
    <p class="lead">Right after the transaction, before it disappears from memory. Amount, bucket, done.</p>
    <div class="grid2">
      <div><label class="fld">Amount</label>
        <div class="money-input"><span class="cur">£</span><input id="spAmt" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div></div>
      <div><label class="fld">Date</label><input id="spDate" type="date" value="${todayISO()}"></div>
    </div>
    <label class="fld" style="margin-top:12px">Bucket</label>
    <div class="bucket-chips" id="spChips"></div>
    <label class="fld" style="margin-top:12px">Planned or unplanned?</label>
    <div class="seg-pick" style="margin-bottom:4px">
      <button class="pick ${spPlan?"on":""}" id="spPl" type="button">Planned</button>
      <button class="pick ${!spPlan?"on":""}" id="spUn" type="button">Unplanned</button>
    </div>
    <label class="fld" style="margin-top:12px">Note <span style="text-transform:none;letter-spacing:0;font-weight:400">— optional</span></label>
    <input id="spNote" type="text" placeholder="What was it?">
    <button class="btn" id="spSave">Log spend</button>
    <div class="ok" id="spOk">Logged ✓</div>
  </div>`);
  const chips=add.querySelector("#spChips");
  if(!m.buckets.length)chips.appendChild(el(`<span style="font-size:13px;color:var(--ink-faint)">No buckets yet — add one:</span>`));
  m.buckets.forEach(b=>{
    const c=el(`<button class="bchip ${spendBucket===b.id?"on":""}" type="button">${esc(b.name)}</button>`);
    c.onclick=()=>{spendBucket=spendBucket===b.id?null:b.id;chips.querySelectorAll(".bchip").forEach(x=>x.classList.remove("on"));if(spendBucket===b.id)c.classList.add("on")};
    chips.appendChild(c);
  });
  const newChip=el(`<button class="bchip" type="button" style="border-style:dashed">+ new bucket</button>`);
  newChip.onclick=()=>{
    const name=prompt("Bucket name (e.g. Eating out, Subscriptions, Weed, Impulse):");
    if(!name)return;
    const bv=prompt("Monthly budget for this bucket in £ (leave blank for none):");
    m.buckets.push({id:uid(),name:name.trim(),budget:bv?num(bv):0});
    save();render();
  };
  chips.appendChild(newChip);
  add.querySelector("#spPl").onclick=()=>{spPlan=true;add.querySelector("#spPl").classList.add("on");add.querySelector("#spUn").classList.remove("on")};
  add.querySelector("#spUn").onclick=()=>{spPlan=false;add.querySelector("#spUn").classList.add("on");add.querySelector("#spPl").classList.remove("on")};
  add.querySelector("#spSave").onclick=()=>{
    const amt=num(add.querySelector("#spAmt").value);
    if(amt<=0){alert("Enter an amount.");return}
    m.spend.unshift({id:uid(),date:add.querySelector("#spDate").value||todayISO(),amount:amt,bucketId:spendBucket,planned:spPlan,note:add.querySelector("#spNote").value.trim()});
    spPlan=true;
    save();
    add.querySelector("#spOk").style.display="block";
    setTimeout(render,500);
  };
  frag.appendChild(add);

  /* month view — where the bleed shows itself */
  const totalSpent=spentIn(monKey);
  const budget=bucketBudgetTotal();
  const now=new Date();
  const dim=new Date(viewedMonth().getFullYear(),viewedMonth().getMonth()+1,0).getDate();
  const projected=isCurrent&&now.getDate()>2?totalSpent/now.getDate()*dim:null;

  const rows=m.buckets.map(b=>({b,spent:spentIn(monKey,b.id)}));
  const other={b:{id:null,name:"Unbucketed",budget:0},spent:spentIn(monKey,null)};
  if(other.spent>0)rows.push(other);
  rows.sort((a,b)=>b.spent-a.spent);
  const bleed=rows.filter(r=>r.b.budget>0&&r.spent>r.b.budget).sort((a,b)=>(b.spent-b.b.budget)-(a.spent-a.b.budget))[0]||(rows[0]&&rows[0].spent>0?rows[0]:null);

  const mon=el(`<div class="card">
    <h2>Where it's going</h2>
    <p class="lead">Spend by bucket, against the monthly budgets you set. The biggest bleed sits at the top.</p>
    <div class="mon-nav">
      <button class="navb" id="monPrev">‹</button>
      <span class="mon">${fmtMonYr(viewedMonth())}</span>
      <button class="navb" id="monNext" ${monthOffset>=0?"disabled":""}>›</button>
    </div>
    <div class="m-stat-grid">
      <div class="stat"><div class="v" style="font-size:20px">${gbp(totalSpent)}</div><div class="k">Spent</div></div>
      <div class="stat"><div class="v" style="font-size:20px">${budget>0?gbp(budget):"–"}</div><div class="k">Budgets total</div></div>
      <div class="stat"><div class="v" style="font-size:20px;color:${unplanned>0?"var(--danger)":"var(--ink)"}">${gbp(unplanned)}</div><div class="k">Unplanned</div></div>
      <div class="stat"><div class="v" style="font-size:20px;color:${projected&&budget>0&&projected>budget?"var(--danger)":"var(--ink)"}">${projected?gbp(projected):"–"}</div><div class="k">${isCurrent?"Month-end pace":"Full month"}</div></div>
    </div>
    ${bleed&&bleed.spent>0?`<div style="font-size:13px;margin-bottom:12px;padding:10px 13px;border-radius:10px;background:var(--spend-s);color:var(--spend-deep)"><b>Biggest bleed:</b> ${esc(bleed.b.name)} — ${gbp(bleed.spent)}${bleed.b.budget>0?` against a ${gbp(bleed.b.budget)} budget`:""}.</div>`:""}
    <div id="bktRows"></div>
    <button class="add-dash" id="editBk">${editBuckets?"Done editing buckets":"Edit buckets & budgets"}</button>
  </div>`);
  mon.querySelector("#monPrev").onclick=()=>{monthOffset--;render()};
  mon.querySelector("#monNext").onclick=()=>{if(monthOffset<0){monthOffset++;render()}};
  mon.querySelector("#editBk").onclick=()=>{editBuckets=!editBuckets;render()};

  const bk=mon.querySelector("#bktRows");
  if(!rows.length)bk.appendChild(el(`<div class="empty">No buckets and nothing logged this month. Add a bucket above and log your first spend.</div>`));
  rows.forEach(({b,spent})=>{
    const hasB=num(b.budget)>0;
    const pc=hasB?Math.min(100,spent/b.budget*100):(totalSpent>0?spent/totalSpent*100:0);
    const over=hasB&&spent>b.budget;
    if(editBuckets&&b.id!==null){
      const row=el(`<div class="bucket">
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" value="${esc(b.name)}" style="flex:1">
          <div class="money-input" style="width:120px"><span class="cur">£</span><input type="number" inputmode="decimal" step="1" min="0" value="${b.budget||""}" placeholder="budget"></div>
          <button class="icon-btn" title="Delete bucket">×</button>
        </div>
      </div>`);
      const [ni,bi]=row.querySelectorAll("input");
      ni.oninput=()=>{b.name=ni.value;save()};
      bi.oninput=()=>{b.budget=num(bi.value);save()};
      row.querySelector(".icon-btn").onclick=()=>{
        if(confirm(`Delete "${b.name}"? Its logged spends stay, shown as Unbucketed.`)){
          M().buckets=M().buckets.filter(x=>x.id!==b.id);
          M().spend.forEach(s=>{if(s.bucketId===b.id)s.bucketId=null});
          save();render();
        }
      };
      bk.appendChild(row);
    }else{
      bk.appendChild(el(`<div class="bucket ${over?"over":""}">
        <div class="top">
          <span class="nm">${esc(b.name)} ${trendArrow(spent,spentIn(prevMonKey,b.id))}</span>
          <span class="amt">${gbp(spent)}${hasB?`<small> / ${gbp(b.budget)}</small>`:""}</span>
        </div>
        <div class="bar rose ${over?"over":""}" style="margin-top:8px"><span style="width:${pc}%"></span></div>
      </div>`));
    }
  });
  frag.appendChild(mon);

  /* transactions this month */
  const txs=m.spend.filter(s=>monthKeyOf(s.date)===monKey).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const txCard=el(`<div class="card">
    <h2>Transactions · ${fmtMonYr(viewedMonth())}</h2>
    <p class="lead">${txs.length?txs.length+" logged":"Nothing logged this month yet."}</p>
    <div id="txList"></div>
  </div>`);
  const tl=txCard.querySelector("#txList");
  txs.forEach(s=>{
    const b=m.buckets.find(x=>x.id===s.bucketId);
    const row=el(`<div class="feed-row">
      <div class="dt">${fmtDate(s.date)}</div>
      <div class="desc">
        <div class="h">${gbp(s.amount)} <span class="chip spn" style="margin-left:6px">${esc(b?b.name:"Unbucketed")}</span>${s.planned===false?'<span class="chip warn" style="margin-left:4px">unplanned</span>':""}</div>
        ${s.note?`<div class="s">${esc(s.note)}</div>`:""}
      </div>
      <button class="del" title="Delete">×</button>
    </div>`);
    row.querySelector(".del").onclick=()=>{
      if(confirm("Delete this transaction?")){m.spend=m.spend.filter(x=>x.id!==s.id);save();render()}
    };
    tl.appendChild(row);
  });
  if(!txs.length)tl.appendChild(el(`<div class="empty">Log a spend above — it lands here.</div>`));
  frag.appendChild(txCard);
  return frag;
}

/* ---------- PAYDAY ---------- */
function payView(){
  const m=M();
  const frag=document.createDocumentFragment();
  const card=el(`<div class="card">
    <h2>Sort a paycheck</h2>
    <p class="lead">Planned outgoings come off first (the total of your bucket budgets), then the surplus runs the waterfall: buffer → goal pots by priority → invest. Override any line if this month is different.</p>
    <div class="grid2">
      <div><label class="fld">Paycheck amount</label>
        <div class="money-input"><span class="cur">£</span><input id="payAmt" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00"></div></div>
      <div><label class="fld">Date</label><input id="payDate" type="date" value="${todayISO()}"></div>
    </div>
    <div class="divider"></div>
    <label class="fld">The waterfall</label>
    <div class="waterfall" id="wf"></div>
    <div class="wf-note" id="wfNote"></div>
    <div class="shortfall" id="wfShort"></div>
    <button class="btn" id="paySort" disabled>Sort this paycheck</button>
    <div class="ok" id="payOk">Sorted ✓</div>
  </div>`);

  function drawWF(){
    const pay=num(card.querySelector("#payAmt").value);
    const s=computeWaterfall(pay);
    const wf=card.querySelector("#wf");
    wf.innerHTML="";
    const mkRow=(tagColor,label,sub,value,key)=>{
      const row=el(`<div class="wf-row">
        <div class="lab"><span class="tag" style="background:${tagColor}"></span><span>${label}${sub?` <small>${sub}</small>`:""}</span></div>
        ${key?`<div class="money-input"><span class="cur">£</span><input type="number" inputmode="decimal" step="0.01" min="0" placeholder="${value.toFixed(2)}" value="${wfOverride[key]!==undefined?wfOverride[key]:""}"></div>`
             :`<div class="figure" style="text-align:right;font-size:15px">${gbp(value)}</div>`}
      </div>`);
      if(key){
        row.querySelector("input").oninput=e=>{
          if(e.target.value==="")delete wfOverride[key];else wfOverride[key]=num(e.target.value);
          drawWF();
        };
      }
      return row;
    };
    wf.appendChild(mkRow("var(--expense)","Outgoings","planned · bucket budgets",s.toExpenses,null));
    wf.appendChild(mkRow("var(--buffer)","Safety buffer",`${gbp(Math.max(0,m.bufferTarget-m.bufferBalance))} to fill`,s.toBuffer,"buffer"));
    sortedGoals().forEach(g=>{
      wf.appendChild(mkRow("var(--goal)",esc(g.name),`${gbp(requiredMonthly(g))}/mo needed`,s.toGoals[g.id]||0,"g:"+g.id));
    });
    wf.appendChild(mkRow("var(--invest)","Invest","the overflow",s.toInvest,null));
    card.querySelector("#wfNote").textContent=pay>0?`Surplus after outgoings: ${gbp(s.surplus)}. Leave override boxes blank for the automatic split.`:"Enter the paycheck to see the split.";
    const sf=card.querySelector("#wfShort");
    if(s.shortfall>0&&pay>0){sf.style.display="block";sf.textContent=`Heads up: planned outgoings exceed this paycheck by ${gbp(s.shortfall)}. Nothing reaches the buffer, goals or investing this round.`}
    else sf.style.display="none";
    card.querySelector("#paySort").disabled=!(pay>0);
  }
  card.querySelector("#payAmt").addEventListener("input",drawWF);
  drawWF();

  card.querySelector("#paySort").onclick=()=>{
    const pay=num(card.querySelector("#payAmt").value);
    if(pay<=0)return;
    const s=computeWaterfall(pay);
    m.bufferBalance+=s.toBuffer;
    m.investBalance+=s.toInvest;
    Object.entries(s.toGoals).forEach(([gid,amt])=>{
      const g=m.goals.find(x=>x.id===gid);if(g)g.saved=num(g.saved)+amt;
    });
    m.paychecks.unshift({id:uid(),date:card.querySelector("#payDate").value||todayISO(),amount:pay,
      toExpenses:s.toExpenses,toBuffer:s.toBuffer,toGoals:s.toGoals,toInvest:s.toInvest});
    wfOverride={};
    save();
    card.querySelector("#payOk").style.display="block";
    setTimeout(render,550);
  };
  frag.appendChild(card);

  /* paycheck history */
  const hist=el(`<div class="card">
    <h2>Paycheck history</h2>
    <p class="lead">Delete one to roll its amounts back out of the buffer, goal pots and invested balance.</p>
    <div id="payHist"></div>
  </div>`);
  const ph=hist.querySelector("#payHist");
  if(!m.paychecks.length)ph.appendChild(el(`<div class="empty">No paychecks sorted yet.</div>`));
  m.paychecks.forEach(h=>{
    const goalBits=Object.entries(h.toGoals||{}).filter(([,v])=>v>0).map(([gid,v])=>{
      const g=m.goals.find(x=>x.id===gid);
      return `<span class="chip goa">${esc(g?g.name:"goal")} ${gbp(v)}</span>`;
    }).join("");
    const row=el(`<div class="feed-row">
      <div class="dt">${fmtDate(h.date)}</div>
      <div class="desc">
        <div class="h figure">${gbp(h.amount)}</div>
        <div class="hist-tags" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
          <span class="chip exp">out ${gbp(h.toExpenses)}</span>
          <span class="chip buf">buffer ${gbp(h.toBuffer)}</span>
          ${goalBits}
          <span class="chip inv">invest ${gbp(h.toInvest)}</span>
        </div>
      </div>
      <button class="del" title="Delete & roll back">×</button>
    </div>`);
    row.querySelector(".del").onclick=()=>{
      if(confirm(`Delete the ${fmtDate(h.date)} paycheck? Its amounts roll back out of your balances.`)){
        m.bufferBalance=Math.max(0,m.bufferBalance-num(h.toBuffer));
        m.investBalance=Math.max(0,m.investBalance-num(h.toInvest));
        Object.entries(h.toGoals||{}).forEach(([gid,v])=>{
          const g=m.goals.find(x=>x.id===gid);if(g)g.saved=Math.max(0,num(g.saved)-num(v));
        });
        m.paychecks=m.paychecks.filter(x=>x.id!==h.id);
        save();render();
      }
    };
    ph.appendChild(row);
  });
  frag.appendChild(hist);
  return frag;
}

/* ---------- GOALS & POTS ---------- */
function goalsView(){
  const m=M();
  const frag=document.createDocumentFragment();

  /* goal pots */
  const gCard=el(`<div class="card">
    <h2>Goal pots</h2>
    <p class="lead">Named things you're saving for, with a deadline. Each shows the monthly contribution it needs and whether you're ahead or behind schedule. Priority order decides who drinks from the waterfall first.</p>
    <div id="goalList"></div>
    <button class="add-dash" id="addGoal">${addingGoal?"Cancel":"+ Add a goal"}</button>
    <div id="goalForm"></div>
  </div>`);
  const gl=gCard.querySelector("#goalList");
  const gs=sortedGoals();
  if(!gs.length&&!addingGoal)gl.appendChild(el(`<div class="empty">No goals yet. The Ironman fund belongs here — target, deadline, and the app does the pacing.</div>`));
  gs.forEach((g,idx)=>{
    const remaining=Math.max(0,num(g.target)-num(g.saved));
    const pc=num(g.target)>0?Math.min(100,num(g.saved)/num(g.target)*100):0;
    const req=requiredMonthly(g);
    const pace=paceDelta(g);
    const proj=recentPaceProjection(g);
    const mLeft=monthsUntil(g.deadline);
    const done=remaining<=0;
    const row=el(`<div class="goal-row">
      <div class="top">
        <span class="nm">${esc(g.name)}</span>
        <span class="meta">${fmtDate(g.deadline)} ${new Date(g.deadline+"T00:00:00").getFullYear()} · ${mLeft.toFixed(0)} mo left</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-top:6px">
        <span class="figure" style="font-size:20px;font-weight:600">${gbp(num(g.saved))}</span>
        <span style="font-size:13px;color:var(--ink-faint)">/ ${gbp(num(g.target))}</span>
      </div>
      <div class="bar slate"><span style="width:${pc}%"></span></div>
      <div class="pace">
        ${done?`<span class="chip good">Funded ✓</span>`:`<span class="chip goa">${gbp(req)}/mo needed</span>`}
        ${pace!==null&&!done?(pace>=0?`<span class="chip good">${gbp(pace)} ahead of schedule</span>`:`<span class="chip warn">${gbp(-pace)} behind schedule</span>`):""}
        ${proj&&!done?`<span style="color:var(--ink-faint);font-size:12px">at recent pace (~${gbp(proj.avg)}/mo) completes ~${proj.when}</span>`:""}
      </div>
      <div class="goal-actions">
        <button class="icon-btn up" title="Higher priority" ${idx===0?"disabled":""}>↑</button>
        <button class="icon-btn dn2" title="Lower priority" ${idx===gs.length-1?"disabled":""}>↓</button>
        <button class="smallbtn" data-a="adj">Adjust saved</button>
        <button class="smallbtn" data-a="edit">Edit</button>
        <button class="smallbtn danger" data-a="del">Delete</button>
      </div>
    </div>`);
    row.querySelector(".up").onclick=()=>{swapPriority(idx,idx-1);};
    row.querySelector(".dn2").onclick=()=>{swapPriority(idx,idx+1);};
    row.querySelector('[data-a="adj"]').onclick=()=>{
      const v=prompt(`Saved so far for ${g.name} (£):`,num(g.saved));
      if(v!==null&&v!==""){g.saved=num(v);save();render()}
    };
    row.querySelector('[data-a="edit"]').onclick=()=>{
      const name=prompt("Goal name:",g.name);if(name===null)return;
      const target=prompt("Target £:",num(g.target));if(target===null)return;
      const dl=prompt("Deadline (YYYY-MM-DD):",g.deadline);if(dl===null)return;
      g.name=name.trim()||g.name;g.target=num(target)||g.target;
      if(/^\d{4}-\d{2}-\d{2}$/.test(dl))g.deadline=dl;
      save();render();
    };
    row.querySelector('[data-a="del"]').onclick=()=>{
      if(confirm(`Delete the "${g.name}" goal? ${num(g.saved)>0?"Its "+gbp(num(g.saved))+" saved moves to the invested balance so nothing is lost.":""}`)){
        m.investBalance+=num(g.saved);
        m.goals=m.goals.filter(x=>x.id!==g.id);
        save();render();
      }
    };
    gl.appendChild(row);
  });
  function swapPriority(a,b){
    const arr=sortedGoals();
    if(b<0||b>=arr.length)return;
    arr.forEach((g,i)=>g.priority=i);
    const t=arr[a].priority;arr[a].priority=arr[b].priority;arr[b].priority=t;
    save();render();
  }
  gCard.querySelector("#addGoal").onclick=()=>{addingGoal=!addingGoal;render()};
  if(addingGoal){
    const f=el(`<div style="margin-top:14px;border:1px solid var(--line);border-radius:11px;padding:14px;background:var(--surface-2)">
      <div class="grid2">
        <div><label class="fld">Name</label><input id="ngName" type="text" placeholder="e.g. Ironman 2027 — entry, travel, kit"></div>
        <div><label class="fld">Target</label><div class="money-input"><span class="cur">£</span><input id="ngTarget" type="number" inputmode="decimal" step="10" min="0" placeholder="0"></div></div>
      </div>
      <div class="grid2" style="margin-top:12px">
        <div><label class="fld">Deadline</label><input id="ngDl" type="date"></div>
        <div><label class="fld">Already saved</label><div class="money-input"><span class="cur">£</span><input id="ngSaved" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0"></div></div>
      </div>
      <button class="btn" id="ngSave">Create goal</button>
    </div>`);
    f.querySelector("#ngSave").onclick=()=>{
      const name=f.querySelector("#ngName").value.trim();
      const target=num(f.querySelector("#ngTarget").value);
      const dl=f.querySelector("#ngDl").value;
      if(!name||target<=0||!dl){alert("Name, target and deadline are all needed — the pacing maths depends on them.");return}
      const saved=num(f.querySelector("#ngSaved").value);
      m.goals.push({id:uid(),name,target,saved,initial:saved,deadline:dl,created:todayISO(),priority:m.goals.length});
      addingGoal=false;save();render();
    };
    gCard.querySelector("#goalForm").appendChild(f);
  }
  frag.appendChild(gCard);

  /* buffer + invest settings */
  const sCard=el(`<div class="card">
    <h2>Buffer &amp; invested</h2>
    <p class="lead">Set these to match reality; paychecks keep them updated from then on.</p>
    <div class="grid2">
      <div><label class="fld">Buffer target</label><div class="money-input"><span class="cur">£</span><input id="sTarget" type="number" inputmode="decimal" step="50" min="0" value="${m.bufferTarget}"></div></div>
      <div><label class="fld">Buffer balance</label><div class="money-input"><span class="cur">£</span><input id="sBuf" type="number" inputmode="decimal" step="0.01" min="0" value="${m.bufferBalance||""}"></div></div>
    </div>
    <div class="grid2" style="margin-top:12px">
      <div><label class="fld">Invested balance</label><div class="money-input"><span class="cur">£</span><input id="sInv" type="number" inputmode="decimal" step="0.01" min="0" value="${m.investBalance||""}"></div></div>
      <div style="display:flex;align-items:flex-end"><button class="btn" id="sSave" style="margin-top:0">Save balances</button></div>
    </div>
  </div>`);
  sCard.querySelector("#sSave").onclick=()=>{
    m.bufferTarget=num(sCard.querySelector("#sTarget").value)||m.bufferTarget;
    m.bufferBalance=num(sCard.querySelector("#sBuf").value);
    m.investBalance=num(sCard.querySelector("#sInv").value);
    save();render();
  };
  frag.appendChild(sCard);
  return frag;
}

function isoOf(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function addDaysISO(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return isoOf(d)}
function mondayOf(iso){const d=new Date(iso+"T00:00:00");const dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return isoOf(d)}
function isoDaysAgo(n){return addDaysISO(todayISO(),-n)}

function brickParts(e){
  const s=((e.type||"")+" "+(e.summary||"")).toLowerCase();
  return {swim:/swim/.test(s),bike:/bike|ride|cycl/.test(s),run:/run/.test(s)};
}
function weekCounts(mon){
  const end=addDaysISO(mon,6),T=state.training;
  const inWk=d=>d>=mon&&d<=end;
  const cal=calTrainingCounts(mon);
  const bricks=T.endLog.filter(e=>inWk(e.date)&&e.disc==="Brick");
  const bParts=bricks.map(brickParts);
  const bSwim=bParts.filter(p=>p.swim).length;
  const bBike=bParts.filter(p=>p.bike).length;
  const bRun=bParts.filter(p=>p.run).length;
  return {
    gym:Math.max(T.gymLog.filter(g=>inWk(g.date)).length,cal.gym),
    swim:Math.max(T.endLog.filter(e=>inWk(e.date)&&e.disc==="Swim").length+bSwim,cal.swim),
    bike:Math.max(T.endLog.filter(e=>inWk(e.date)&&e.disc==="Bike").length+bBike,cal.bike),
    run:Math.max(T.endLog.filter(e=>inWk(e.date)&&e.disc==="Run").length+bRun,cal.run),
    brick:bricks.length,
    brickSwim:bSwim,brickBike:bBike,brickRun:bRun,
    mob:Math.max(T.mobLog.filter(x=>inWk(x.date)).length,cal.mob),
    faith:(state.life.faith||{})[mon]||0,
    z2:T.endLog.filter(e=>inWk(e.date)&&/z2|easy|long/i.test(e.type||"")).reduce((s,e)=>s+num(e.dur),0)
  };
}
function quotaMet(c,q){
  const checks=[c.gym>=q.gym,c.swim>=q.swim,c.bike>=q.bike,c.mob>=q.mobility,c.faith>=q.faith];
  if(q.run>0)checks.push(c.run>=q.run);
  return {done:checks.filter(Boolean).length,total:checks.length,all:checks.every(Boolean)};
}

function liftMaxWindow(k,from,to){
  let b=0;
  state.training.gymLog.forEach(g=>{
    if(g.date<from||g.date>to)return;
    (g.exercises||[]).forEach(e=>{if(e.k===k)e.lines.forEach(l=>{if(l.w>b)b=l.w})});
  });
  return b;
}

/* =====================================================================
   TODAY STRIP — the daily tick-strip, visible in every module

function habitStreak(hid){
  const L=state.habits.log;
  let d=todayISO(),n=0;
  if(!(L[d]&&L[d][hid]))d=addDaysISO(d,-1);
  while(L[d]&&L[d][hid]){n++;d=addDaysISO(d,-1)}
  return n;
}
function logStart(){const k=Object.keys(state.habits.log||{});return k.length?k.sort()[0]:todayISO();}
function habitStart(hid){
  const L=state.habits.log||{},keys=Object.keys(L).sort();
  for(const k of keys){if(L[k]&&L[k][hid])return k;}
  return logStart();
}
function habitMissStreak(hid){
  const H=state.habits,L=H.log,h=H.list.find(x=>x.id===hid); if(!h)return 0;
  const start=habitStart(hid);
  let cur = stripDay==="today" ? todayISO() : addDaysISO(todayISO(),-1);
  let n=0,guard=0;
  while(guard++<400&&cur>=start){
    if(habitApplies(h,cur)){ if(L[cur]&&L[cur][hid])break; n++; }
    cur=addDaysISO(cur,-1);
  }
  return n;
}
function habitAdhFor(hid,days){
  const H=state.habits,L=H.log,h=H.list.find(x=>x.id===hid); if(!h)return null;
  const start=habitStart(hid);
  let tk=0,poss=0;
  for(let i=0;i<days;i++){const iso=isoDaysAgo(i); if(iso<start||!habitApplies(h,iso))continue; poss++; if(L[iso]&&L[iso][hid])tk++;}
  return poss?{pct:Math.round(tk/poss*100),tk,poss}:null;
}
function buildHabitInsights(){
  const H=state.habits;
  const wrap=el(`<div class="hi-wrap"></div>`);
  /* --- attention: miss streaks + declining trend --- */
  const attn=[];
  H.list.forEach(h=>{
    const ms=habitMissStreak(h.id);
    const a7=habitAdhFor(h.id,7),a30=habitAdhFor(h.id,30);
    if(ms>=2){attn.push({h,kind:"miss",ms});}
    else if(a7&&a30&&a30.pct>0&&a7.pct<=a30.pct-25){attn.push({h,kind:"drop",a7,a30});}
  });
  wrap.appendChild(el(`<div class="hi-h">Needs attention</div>`));
  if(attn.length){
    const box=el(`<div class="hi-attn"></div>`);
    attn.sort((a,b)=>(b.ms||0)-(a.ms||0)).forEach(a=>{
      if(a.kind==="miss"){
        box.appendChild(el(`<div class="hi-row"><span class="hi-badge miss">${a.ms}× missed</span><span>${esc(a.h.label)} — not ticked ${a.ms} day${a.ms===1?"":"s"} running. ${a.ms>=4?"Worth a reset today.":"Don’t let it drift."}</span></div>`));
      }else{
        box.appendChild(el(`<div class="hi-row"><span class="hi-badge drop">${a.a7.pct}% ↓</span><span>${esc(a.h.label)} — slipping: ${a.a7.pct}% this week vs ${a.a30.pct}% over 30 days.</span></div>`));
      }
    });
    wrap.appendChild(box);
  }else{
    wrap.appendChild(el(`<div class="hi-good">✓ Nothing slipping — every habit on track.</div>`));
  }
  /* --- 4-week history grid --- */
  wrap.appendChild(el(`<div class="hi-h" style="margin-top:16px">Last 4 weeks · oldest left, today right</div>`));
  const grid=el(`<div class="hgrid"><div class="hgrid-inner"></div></div>`);
  const inner=grid.querySelector(".hgrid-inner");
  let head=`<div class="hgrid-head"><span></span>`;

  return wrap;
}
function buildTodayStrip(host){

  }else{
    body.appendChild(el(`<div style="font-size:12px;color:var(--ink-faint);margin-bottom:4px">Scope sets which days a habit counts toward adherence. Weekday-only habits don't hurt your % at weekends.</div>`));
    H.list.forEach(h=>{
      if(!h.scope)h.scope="all";
      const row=el(`<div class="habedit"><input type="text" value="${esc(h.label)}"><button class="scopebtn">${h.scope==="weekday"?"Mon–Fri":"Every day"}</button><button class="icon-btn">×</button></div>`);
      row.querySelector("input").oninput=e=>{h.label=e.target.value;save()};
      row.querySelector(".scopebtn").onclick=()=>{h.scope=h.scope==="weekday"?"all":"weekday";save();render()};
      row.querySelector(".icon-btn").onclick=()=>{

function ensureWeek(mon){
  const C=state.calendar;
  if(!C.weeks[mon]){
    C.weeks[mon]={days:DAYS.map((_,i)=>i<5?{wake:"06:30",blocks:[{id:uid(),time:"09:00",type:"work",label:"Work",done:false,cat:""}]}:{wake:"",blocks:[]})};
  }
  return C.weeks[mon];
}
const BLOCK_TYPES=[
  {k:"work",label:"Work",v:"--navy",s:"--d-gym-s"},
  {k:"training",label:"Training",v:"--d-run",s:"--d-run-s"},
  {k:"faith",label:"Faith",v:"--gold",s:"--gold-soft"},
  {k:"break",label:"Break",v:"--d-swim",s:"--d-swim-s"},
  {k:"personal",label:"Personal",v:"--d-brick",s:"--d-brick-s"},
  {k:"meal",label:"Meal",v:"--d-bike",s:"--d-bike-s"}
];
const TRAIN_CATS=[["","— link to quota"],["gym","Gym"],["swim","Swim"],["bike","Bike"],["run","Run"],["mob","Mobility"]];
function blockType(k){return BLOCK_TYPES.find(t=>t.k===k)||BLOCK_TYPES[0]}
function sortedBlocks(day){
  const timed=day.blocks.filter(b=>b.time).sort((a,b)=>a.time.localeCompare(b.time));
  const untimed=day.blocks.filter(b=>!b.time);
  return [...timed,...untimed];
}
function isWeekendISO(iso){const g=new Date(iso+"T00:00:00").getDay();return g===0||g===6}
function habitApplies(h,iso){return h.scope!=="weekday"||!isWeekendISO(iso)}

/* training blocks ticked done in the calendar feed the quota (max with logged, no double-count) */
function calTrainingCounts(mon){
  const wk=state.calendar.weeks[mon];
  const c={gym:0,swim:0,bike:0,run:0,mob:0};
  if(wk)wk.days.forEach(day=>day.blocks.forEach(b=>{
    if(b.type==="training"&&b.done&&b.cat&&c[b.cat]!==undefined)c[b.cat]++;
  }));
  return c;
}

let typePopFor=null; // block id whose type-picker is open

function calBlockRow(day,b,idx,untimedList){
  const t=blockType(b.type);
  const canUp=untimedList&&untimedList.indexOf(b)>0;
  const canDown=untimedList&&untimedList.indexOf(b)>=0&&untimedList.indexOf(b)<untimedList.length-1;
  const isTrain=b.type==="training";
  const row=el(`<div class="blk ${esc(b.type)} ${b.done?"done":""}">
    <div class="time"><input type="time" value="${esc(b.time||"")}" title="Start time — optional"></div>
    <div class="spine" style="background:var(${t.v})"></div>

    </div>
    <div class="blkacts">
      ${(canUp||canDown)?`<span class="reord"><button class="rbtn up" ${canUp?"":"disabled"} title="Move up">▴</button><button class="rbtn dn" ${canDown?"":"disabled"} title="Move down">▾</button></span>`:""}
      <button class="tick" title="Mark done">✓</button>

    </div>
  </div>`);
  // type popover
  if(typePopFor===b.id){
    const pop=el(`<div class="typepop">${BLOCK_TYPES.map(tt=>`<button data-k="${tt.k}" class="${tt.k===b.type?"on":""}"><span class="sw" style="background:var(${tt.v})"></span>${tt.label}</button>`).join("")}</div>`);
    pop.querySelectorAll("button").forEach(btn=>btn.onclick=()=>{b.type=btn.dataset.k;if(b.type!=="training")b.cat="";typePopFor=null;save();render()});
    row.querySelector(".main").appendChild(pop);
  }
  row.querySelector(".dot").onclick=()=>{typePopFor=typePopFor===b.id?null:b.id;render()};
  row.querySelector(".time input").onchange=e=>{b.time=e.target.value;save();render()};
  row.querySelector(".lbl").oninput=e=>{b.label=e.target.value;save()};
  const cs=row.querySelector(".catsel");if(cs)cs.onchange=()=>{b.cat=cs.value;save()};
  row.querySelector(".tick").onclick=()=>{b.done=!b.done;save();render()};
  row.querySelector(".rm").onclick=()=>{day.blocks=day.blocks.filter(x=>x.id!==b.id);typePopFor=null;save();render()};
  const up=row.querySelector(".rbtn.up"),dn=row.querySelector(".rbtn.dn");
  if(up&&canUp)up.onclick=()=>{swapUntimed(day,b,-1)};
  if(dn&&canDown)dn.onclick=()=>{swapUntimed(day,b,1)};
  return row;
}
function swapUntimed(day,b,dir){
  const untimed=day.blocks.filter(x=>!x.time);
  const ui=untimed.indexOf(b),other=untimed[ui+dir];
  if(!other)return;
  const ia=day.blocks.indexOf(b),ib=day.blocks.indexOf(other);
  day.blocks[ia]=other;day.blocks[ib]=b;save();render();
}
function _oldCalBlockRow(day,b){
  const row=el(`<div class="cal-block bt-${esc(b.type)}">
    <select><option value="work" ${b.type==="work"?"selected":""}>Work</option><option value="training" ${b.type==="training"?"selected":""}>Training</option><option value="other" ${b.type==="other"?"selected":""}>Other</option></select>

  return row;
}
function goto(mod){module_=mod;state.ui.module=mod;save();render()}
function ring(pct,color,size){
  const r=(size/2)-6, c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(1,pct/100)));
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line)" stroke-width="6"></circle>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(${color})" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"></circle>
  </svg>`;
}
function habitAdh(days){
  const H=state.habits;let tk=0,poss=0;
  for(let i=0;i<days;i++){const iso=isoDaysAgo(i),l=H.log[iso]||{};H.list.forEach(h=>{if(iso<habitStart(h.id)||!habitApplies(h,iso))return;poss++;if(l[h.id])tk++})}
  return poss?Math.round(tk/poss*100):0;
}
function bestStreak(){let b=0;state.habits.list.forEach(h=>{const st=habitStreak(h.id);if(st>b)b=st});return b}

function renderDashboard(root){
  const ph=currentPhase(), m=M(), t=todayISO();
  const hr=new Date().getHours();
  const greet=hr<12?"Good morning":hr<18?"Good afternoon":"Good evening";

    const pct=tot?Math.round(done/tot*100):0;
    g.appendChild(dashCard("training","Training · this week",`
      <div class="dc-ring">${ring(pct,"--d-run",78)}<div class="dc-ring-c"><b>${done}</b><span>/${tot}</span></div></div>
      <div class="dc-side"><div class="dc-big">${pct}%</div><div class="dc-sub">of this week's ${w.block} sessions ticked</div></div>`));
  }else{
    const mon=mondayOf(t),c=weekCounts(mon),q=state.training.quota;
    const rows=[["Gym",c.gym,q.gym,"--d-gym"],["Swim",c.swim,q.swim,"--d-swim"],["Bike",c.bike,q.bike,"--d-bike"],["Mobility",c.mob,q.mobility,"--d-mob"],["Faith",c.faith,q.faith,"--gold"]];
    if(q.run>0)rows.splice(3,0,["Run",c.run,q.run,"--d-run"]);
    g.appendChild(dashCard("training","Training · quota this week",
      `<div class="dc-quota">${rows.map(r=>`<div class="dq"><span class="dq-l"><span class="tag" style="background:var(${r[3]})"></span>${r[0]}</span><span class="dq-v ${r[1]>=r[2]?"hit":""}">${r[1]}/${r[2]}</span></div>`).join("")}</div>
       ${c.z2?`<div class="dc-foot">Z2 volume ${c.z2} min</div>`:""}`));
  }

  /* ---- BUFFER / INVEST card ---- */

  const goalsSaved=m.goals.reduce((a,x)=>a+num(x.saved),0);
  g.appendChild(dashCard("money","Safety buffer",`
    <div class="dc-ring">${ring(bpct,secured?"--invest":"--buffer",78)}<div class="dc-ring-c"><b>${Math.round(bpct)}</b><span>%</span></div></div>
    <div class="dc-side">
      <div class="dc-big">${gbp(m.bufferBalance)}</div>
      <div class="dc-sub">of ${gbp(m.bufferTarget)} · ${secured?"secured — investing":gbp(Math.max(0,m.bufferTarget-m.bufferBalance))+" to go"}</div>
      <div class="dc-chips"><span class="dc-chip">${gbp(m.investBalance)} invested</span><span class="dc-chip">${gbp(goalsSaved)} in goals</span></div>
    </div>`));

  /* ---- MONTH SPEND card ---- */
  const mk=t.slice(0,7);
  const spent=spentIn(mk), budget=bucketBudgetTotal();
  const unpl=m.spend.filter(x=>monthKeyOf(x.date)===mk&&x.planned===false).reduce((a,x)=>a+num(x.amount),0);
  const spct=budget>0?Math.min(100,Math.round(spent/budget*100)):0;
  const over=budget>0&&spent>budget;
  g.appendChild(dashCard("money","This month's spending",`
    <div class="dc-big">${gbp(spent)}${budget>0?`<span class="dc-of"> / ${gbp(budget)}</span>`:""}</div>
    ${budget>0?`<div class="dc-bar"><span style="width:${spct}%;background:${over?"var(--danger)":"var(--buffer)"}"></span></div>
      <div class="dc-sub">${over?gbp(spent-budget)+" over budget":gbp(Math.max(0,budget-spent))+" left"}</div>`:`<div class="dc-sub">No budgets set yet</div>`}
    <div class="dc-chips"><span class="dc-chip ${unpl>0?"warn":""}">${gbp(unpl)} unplanned</span></div>`));

  /* ---- HABITS card ---- */
  const a7=habitAdh(7),a30=habitAdh(30),streak=bestStreak();
  const H=state.habits;
  const heat=[];for(let i=6;i>=0;i--){const iso=isoDaysAgo(i);const appl=H.list.filter(h=>habitApplies(h,iso));const l=H.log[iso]||{};const dn=appl.filter(h=>l[h.id]).length;const r=appl.length?dn/appl.length:0;heat.push({iso,r,wd:new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{weekday:"narrow"})})}
  g.appendChild(dashCard("habit","Habits","",`
    <div class="dc-two"><div><div class="dc-big">${a7}%</div><div class="dc-sub">last 7 days</div></div><div><div class="dc-big">${a30}%</div><div class="dc-sub">last 30 days</div></div></div>
    <div class="dc-heat">${heat.map(h=>`<div class="hcell" title="${fmtDate(h.iso)} · ${Math.round(h.r*100)}%"><span style="opacity:${(0.15+h.r*0.85).toFixed(2)}"></span><em>${h.wd}</em></div>`).join("")}</div>
    <div class="dc-foot">Best current streak · <b>${streak} day${streak===1?"":"s"}</b></div>`));

  /* ---- TODAY'S PLAN card (calendar) ---- */
  const mon=mondayOf(t);
  const wk=state.calendar.weeks[mon];
  let planHTML;
  if(wk){
    const di=DAYS.findIndex((_,i)=>addDaysISO(mon,i)===t);
    const day=wk.days[di];
    const named=day?sortedBlocks(day).filter(b=>(b.label||"").trim()):[];
    if(named.length){

      planHTML=`<div class="dc-plan">${named.slice(0,5).map(b=>`<div class="dp ${b.done?"done":""}"><span class="dp-t">${b.time?esc(b.time):"—"}</span><span class="dp-sp" style="background:var(${blockType(b.type).v})"></span><span class="dp-l">${esc(b.label)}</span>${b.done?`<span class="dp-ck">✓</span>`:""}</div>`).join("")}${named.length>5?`<div class="dc-foot">+${named.length-5} more</div>`:""}</div>
        <div class="dc-foot">${doneN}/${named.length} done today</div>`;
    }else planHTML=`<div class="dc-empty">Nothing planned for today.<br><span class="dc-link">Open the planner →</span></div>`;
  }else planHTML=`<div class="dc-empty">This week isn't planned yet.<br><span class="dc-link">Plan the week →</span></div>`;
  g.appendChild(dashCard("calendar","Today's plan","",planHTML));

  /* ---- RECOMP card (Phase 2+) ---- */
  if(ph>=2){
    const B=[...state.training.body].sort((a,b)=>a.date.localeCompare(b.date));
    const waists=B.filter(e=>num(e.waist)>0);
    const lastW=waists[waists.length-1],prevW=waists[waists.length-2];
    const avg=(from,to)=>{const es=B.filter(e=>num(e.weight)>0&&e.date>=from&&e.date<=to);return es.length?es.reduce((a,e)=>a+num(e.weight),0)/es.length:null};
    const a7w=avg(addDaysISO(t,-6),t),p7w=avg(addDaysISO(t,-13),addDaysISO(t,-7));
    const wd=(lastW&&prevW)?(num(lastW.waist)-num(prevW.waist)):null;
    const kd=(a7w!==null&&p7w!==null)?(a7w-p7w):null;
    g.appendChild(dashCard("training","Recomp",`
      <div class="dc-two">
        <div><div class="dc-big">${lastW?esc(lastW.waist):"–"}<span class="dc-u">cm</span></div><div class="dc-sub">waist${wd!==null?` <b style="color:${wd<=0?"var(--d-run)":"var(--danger)"}">${wd>0?"+":""}${wd.toFixed(1)}</b>`:""}</div></div>
        <div><div class="dc-big">${a7w!==null?a7w.toFixed(1):"–"}<span class="dc-u">kg</span></div><div class="dc-sub">7-day avg${kd!==null?` <b style="color:${kd<=0?"var(--d-run)":"var(--danger)"}">${kd>0?"+":""}${kd.toFixed(1)}</b>`:""}</div></div>
      </div>
      <div class="dc-foot">${B.length} measurement${B.length===1?"":"s"} logged</div>`));
  }

  root.appendChild(frag);

  // wire card taps
  frag.querySelectorAll("[data-goto]").forEach(c=>c.onclick=()=>goto(c.dataset.goto));
}

   ===================================================================== */
function discLabel(k){return ({gym:"gym",swim:"swim",bike:"bike",mob:"mobility",faith:"faith",run:"run"})[k]||k}
function briefLinesFor(ctx){
  const {c,q,met,daysLeft,sDone,sTot,m,t}=ctx, lines=[];
  const rem=[["gym",q.gym-c.gym],["swim",q.swim-c.swim],["bike",q.bike-c.bike],["mob",q.mobility-c.mob]];
  if(q.run>0)rem.push(["run",q.run-c.run]);
  const remCnt=rem.reduce((s,r)=>s+Math.max(0,r[1]),0);
  if(met.all){
    lines.push(["--d-run","Full quota already banked — every session now is a bonus this week."]);
  }else{
    /* pace = are you ahead of where a steady spread would put you by now? */
    const daysElapsed=8-daysLeft;               // Mon=1 … Sun=7
    if(daysElapsed<=1){
      lines.push(["--d-run",`${remCnt} session${remCnt===1?"":"s"} to spread across the week — fresh start, plenty of runway.`]);
    }else{
      const expected=Math.round(sTot*daysElapsed/7);
      const onPace=sDone>=expected;
      const tail = onPace ? "right on pace, keep chipping" : `a little behind pace (target ~${expected} by now), fit an extra in`;
      lines.push([onPace?"--d-run":"--gold",`${remCnt} session${remCnt===1?"":"s"} left this week, ${daysLeft} day${daysLeft===1?"":"s"} to go — ${tail}.`]);
    }
  }
  const mk=t.slice(0,7), budget=bucketBudgetTotal(), spent=spentIn(mk);
  if(budget>0){
    const left=budget-spent, dObj=new Date(t+"T00:00:00");
    const dim=new Date(dObj.getFullYear(),dObj.getMonth()+1,0).getDate(), dLeft=dim-dObj.getDate()+1;
    lines.push(["--gold", left>=0?`${gbp(left)} of budget left this month — about ${gbp(left/Math.max(1,dLeft))}/day for ${dLeft} more day${dLeft===1?"":"s"}.`:`${gbp(-left)} over budget this month — ease off where you can.`]);
  }else{
    const gap=Math.max(0,m.bufferTarget-m.bufferBalance);
    lines.push(["--buffer", gap>0?`${gbp(gap)} from a full safety buffer — ${gbp(m.bufferBalance)} secured so far.`:`Safety buffer is full — surplus is heading to investing.`]);
  }
  const mon=mondayOf(t), wk=state.calendar.weeks[mon]; let planned=[];
  if(wk){const di=DAYS.findIndex((_,i)=>addDaysISO(mon,i)===t);const day=wk.days[di];planned=day?sortedBlocks(day).filter(b=>(b.label||"").trim()):[]}
  if(planned.length){
    const nextUp=planned.find(b=>!b.done)||planned[0];
    lines.push(["--navy",`${planned.length} thing${planned.length===1?"":"s"} planned today — next up: ${nextUp.label.trim()}.`]);
  }else{
    const gaps=rem.filter(r=>r[1]>0).sort((a,b)=>b[1]-a[1]);
    lines.push(["--navy", gaps.length?`Nothing planned today yet — a ${discLabel(gaps[0][0])} session keeps the week moving.`:`Nothing planned today — rest is part of the plan.`]);
  }
  return lines.slice(0,3);
}
function qLine(r){
  const [name,key,cnt,tgt,color]=r; let pips="";
  if(tgt===0){
    return `<div class="qline"><span class="ql-name" style="color:var(${color})">${name}</span><span class="pips"><span class="ql-frac">${cnt} logged</span></span><span class="ql-frac"></span></div>`;
  }
  for(let i=0;i<tgt;i++)pips+=`<span class="pip ${i<cnt?"on":""}" style="${i<cnt?`background:var(${color})`:""}"></span>`;
  for(let i=0;i<Math.max(0,cnt-tgt);i++)pips+=`<span class="pip on extra" style="border-color:var(${color})"></span>`;
  return `<div class="qline"><span class="ql-name" style="color:var(${color})">${name}</span><span class="pips">${pips}</span><span class="ql-frac ${cnt>=tgt?"hit":""}">${cnt}/${tgt}</span></div>`;
}
function renderDashboard(root){
  const ph=currentPhase(), m=M(), t=todayISO();
  const hr=new Date().getHours();
  const greet=hr<12?"Good morning":hr<18?"Good afternoon":"Good evening";
  const dtr=daysToRace();
  const mon=mondayOf(t);
  const c=weekCounts(mon), q=state.training.quota, met=quotaMet(c,q);
  const todayIdx=(new Date().getDay()+6)%7, daysLeft=7-todayIdx;
  const qrows=[["Gym","gym",c.gym,q.gym,"--d-gym"],["Swim","swim",c.swim,q.swim,"--d-swim"],["Bike","bike",c.bike,q.bike,"--d-bike"],["Mobility","mob",c.mob,q.mobility,"--d-mob"]];
  if(q.run>0)qrows.splice(3,0,["Run","run",c.run,q.run,"--d-run"]);
  const sDone=qrows.reduce((s,r)=>s+Math.min(r[2],r[3]),0), sTot=qrows.reduce((s,r)=>s+r[3],0);
  const toGo=qrows.filter(r=>r[2]<r[3]).map(r=>`${r[3]-r[2]} ${r[0].toLowerCase()}`);
  const lines=briefLinesFor({c,q,met,daysLeft,sDone,sTot,m,t});
  const heroBig= ph===1

      <div class="qgrid">${qrows.map(qLine).join("")}</div>
      <div class="qhero-foot">
        <span>Week of ${fmtDate(mon)} · resets Monday</span>
        <span style="display:flex;gap:6px;flex-wrap:wrap">${c.brick?`<span class="chip" title="Each brick counts toward every discipline it contains — e.g. a swim-bike brick adds 1 swim + 1 bike">${c.brick} brick${c.brick===1?"":"s"} → ${[c.brickSwim&&"swim",c.brickBike&&"bike",c.brickRun&&"run"].filter(Boolean).join("+")||"counted"}</span>`:""}${c.z2?`<span class="chip">Z2 ${c.z2}min</span>`:""}</span>
      </div>
    </div>

    <div class="dash-grid" id="dashGrid"></div>
  </div>`);
  const g=frag.querySelector("#dashGrid");

  /* buffer / invest */
  const secured=m.bufferBalance>=m.bufferTarget;
  const bpct=m.bufferTarget>0?Math.min(100,(m.bufferBalance/m.bufferTarget)*100):100;
  const goalsSaved=m.goals.reduce((a,x)=>a+num(x.saved),0);
  g.appendChild(dashCard("money","Safety buffer",`
    <div class="dc-ring">${ring(bpct,secured?"--invest":"--buffer",78)}<div class="dc-ring-c"><b>${Math.round(bpct)}</b><span>%</span></div></div>

      <div class="dc-big">${gbp(m.bufferBalance)}</div>

    </div>`));

  /* month spend */
  const mk=t.slice(0,7), spent=spentIn(mk), budget=bucketBudgetTotal();
  const unpl=m.spend.filter(x=>monthKeyOf(x.date)===mk&&x.planned===false).reduce((a,x)=>a+num(x.amount),0);
  const spct=budget>0?Math.min(100,Math.round(spent/budget*100)):0, over=budget>0&&spent>budget;
  g.appendChild(dashCard("money","This month's spending","",`
    <div class="dc-big">${gbp(spent)}${budget>0?`<span class="dc-of"> / ${gbp(budget)}</span>`:""}</div>
    ${budget>0?`<div class="dc-bar"><span style="width:${spct}%;background:${over?"var(--danger)":"var(--buffer)"}"></span></div>
      <div class="dc-sub">${over?gbp(spent-budget)+" over budget":gbp(Math.max(0,budget-spent))+" left"}</div>`:`<div class="dc-sub">No budgets set yet</div>`}
    <div class="dc-chips"><span class="dc-chip ${unpl>0?"warn":""}">${gbp(unpl)} unplanned</span></div>`));

  /* habits */
  const a7=habitAdh(7),a30=habitAdh(30),streak=bestStreak(),H=state.habits;
  const heat=[];for(let i=6;i>=0;i--){const iso=isoDaysAgo(i);const appl=H.list.filter(h=>habitApplies(h,iso));const l=H.log[iso]||{};const dn=appl.filter(h=>l[h.id]).length;const rr=appl.length?dn/appl.length:0;heat.push({iso,r:rr,wd:new Date(iso+"T00:00:00").toLocaleDateString("en-GB",{weekday:"narrow"})})}
  g.appendChild(dashCard("habit","Habits","",`
    <div class="dc-two"><div><div class="dc-big">${a7}%</div><div class="dc-sub">last 7 days</div></div><div><div class="dc-big">${a30}%</div><div class="dc-sub">last 30 days</div></div></div>
    <div class="dc-heat">${heat.map(h=>`<div class="hcell" title="${fmtDate(h.iso)} · ${Math.round(h.r*100)}%"><span style="opacity:${(0.15+h.r*0.85).toFixed(2)}"></span><em>${h.wd}</em></div>`).join("")}</div>
    <div class="dc-foot">Best current streak · <b>${streak} day${streak===1?"":"s"}</b></div>`));

  /* TODAY — planned training session (from the training sheet) + core calendar tasks */
  const pt=plannedTrainingToday();
  const wk=state.calendar.weeks[mon];
  const di=DAYS.findIndex((_,i)=>addDaysISO(mon,i)===t);
  const day=wk?wk.days[di]:null;
  const named=day?sortedBlocks(day).filter(b=>(b.label||"").trim()):[];
  let ptHTML;
  if(pt){
    const dm=DISC[pt.disc]||{label:pt.disc,v:"--navy",s:"--surface-2"};
    const rest=pt.disc==="rest"||pt.disc==="hol";
    ptHTML=`<div class="today-train" style="border-left-color:var(${dm.v})">
      <div class="tt-l"><span class="disc-tag" style="color:var(${dm.v});background:var(${dm.s})">${rest?"Rest":esc(dm.label)}</span><span class="tt-title">${esc(pt.title)}</span></div>
      ${pt.detail?`<div class="tt-detail">${esc(pt.detail)}</div>`:""}
      <div class="tt-foot">Prescribed · ${esc(pt.block)} block · from your training sheet</div>

      <div class="tt-l"><span class="disc-tag" style="color:var(--ink-soft);background:var(--surface-2)">Training</span><span class="tt-title">No prescribed session today</span></div>

  }else{
    tasksHTML=`<div class="today-tasks"><div class="tt-h">Core tasks</div><div class="dc-empty">Nothing planned in the calendar today.<br><span class="dc-link">Open the planner →</span></div></div>`;
  }
  const todayEl=el(`<div class="card today-card" data-goto="calendar">
    <div class="qhero-head"><h2>Today's plan</h2><span class="qhero-tot">${fmtFull(t)}</span></div>
    ${ptHTML}
    ${tasksHTML}
  </div>`);
  frag.querySelector(".dash-grid").insertAdjacentElement("beforebegin",todayEl);

  /* recomp (phase 2+) */
  if(ph>=2){
    const B=[...state.training.body].sort((a,b)=>a.date.localeCompare(b.date));
    const waists=B.filter(e=>num(e.waist)>0);
    const lastW=waists[waists.length-1],prevW=waists[waists.length-2];
    const avg=(from,to)=>{const es=B.filter(e=>num(e.weight)>0&&e.date>=from&&e.date<=to);return es.length?es.reduce((a,e)=>a+num(e.weight),0)/es.length:null};
    const a7w=avg(addDaysISO(t,-6),t),p7w=avg(addDaysISO(t,-13),addDaysISO(t,-7));
    const wd=(lastW&&prevW)?(num(lastW.waist)-num(prevW.waist)):null;
    const kd=(a7w!==null&&p7w!==null)?(a7w-p7w):null;
    g.appendChild(dashCard("training","Recomp",`
      <div class="dc-two">
        <div><div class="dc-big">${lastW?esc(lastW.waist):"–"}<span class="dc-u">cm</span></div><div class="dc-sub">waist${wd!==null?` <b style="color:${wd<=0?"var(--d-run)":"var(--danger)"}">${wd>0?"+":""}${wd.toFixed(1)}</b>`:""}</div></div>
        <div><div class="dc-big">${a7w!==null?a7w.toFixed(1):"–"}<span class="dc-u">kg</span></div><div class="dc-sub">7-day avg${kd!==null?` <b style="color:${kd<=0?"var(--d-run)":"var(--danger)"}">${kd>0?"+":""}${kd.toFixed(1)}</b>`:""}</div></div>
      </div>
      <div class="dc-foot">${B.length} measurement${B.length===1?"":"s"} logged</div>`));
  }

  root.appendChild(frag);
  frag.querySelectorAll("[data-goto]").forEach(cc=>cc.onclick=()=>goto(cc.dataset.goto));
  frag.querySelector("#briefTrain").onclick=()=>goto("training");
  frag.querySelector("#briefGym").onclick=()=>openQuickLog();
}

/* ---------- phone-first gym quick-log ---------- */
function lastSetFor(k){
  for(const g of state.training.gymLog){
    const ex=(g.exercises||[]).find(e=>e.k===k);
    if(ex&&ex.lines&&ex.lines.length){const top=ex.lines[ex.lines.length-1];return {s:top.s,r:top.r,w:top.w,date:g.date}}
  }
  return null;
}
function lastHTML(l){return l?`Last time · <b>${l.s||1}×${esc(String(l.r||""))} @ ${l.w||0}kg</b> · ${fmtDate(l.date)}`:"No history yet — set your first."}
function lastSummary(k){
  for(const g of state.training.gymLog){
    const ex=(g.exercises||[]).find(e=>e.k===k);
    if(ex&&ex.lines&&ex.lines.length){
      const parts=ex.lines.map(l=>`${l.s||1}×${esc(String(l.r||"?"))}${l.w?" @ "+l.w+"kg":""}`);
      return {text:parts.join("  ·  "),date:g.date,top:ex.lines[ex.lines.length-1]};
    }
  }
  return null;
}
function baseHTML(b){return b?`Last · <b>${b.text}</b> · ${fmtDate(b.date)}`:"No history yet — this session sets your baseline."}
function plannedTrainingToday(){
  if(currentPhase()!==1)return null;
  const w=SCHEDULE[currentWkIdx()]; if(!w)return null;
  const idx=(new Date().getDay()+6)%7;
  const d=w.days[idx]; if(!d)return null;
  return {disc:d.disc,title:d.t,detail:d.x,block:w.block};
}
function qkSet(pre){
  const row=el(`<div class="qk-set">
    <div class="qk-fld"><label>Sets</label><input class="ls" type="number" inputmode="numeric" min="1" step="1" value="${pre&&pre.s?pre.s:""}" placeholder="—"></div>
    <div class="qk-fld"><label>Reps</label><input class="lr" type="text" inputmode="numeric" value="${pre&&pre.r?esc(String(pre.r)):""}" placeholder="—"></div>
    <div class="qk-fld"><label>Kg</label><input class="lw" type="number" inputmode="decimal" min="0" step="0.5" value="${pre&&pre.w?pre.w:""}" placeholder="—"></div>
    <button class="qk-rm" type="button" title="Remove">✕</button>
  </div>`);
  row.querySelector(".qk-rm").onclick=()=>row.remove();
  return row;
}
function openQuickLog(){
  closeQuickLog();
  const G=activeGYM(); if(!G[logDay])logDay=Object.keys(G)[0];
  const ov=el(`<div class="ql-ov" id="qlOv"></div>`);
  const sheet=el(`<div class="ql-sheet"></div>`);
  ov.appendChild(sheet);
  ov.onclick=e=>{if(e.target===ov)closeQuickLog()};
  document.body.appendChild(ov);
  document.body.style.overflow="hidden";
  drawQuickLog(sheet);
}
function closeQuickLog(){const o=document.getElementById("qlOv");if(o)o.remove();document.body.style.overflow=""}
function drawQuickLog(sheet){
  const G=activeGYM(), tpl=G[logDay];
  sheet.innerHTML="";
  sheet.appendChild(el(`<div class="ql-sheet-head">
    <div><div style="font-family:var(--f-display);font-weight:600;font-size:20px">Log gym session</div><div style="font-size:12.5px;color:var(--ink-soft)">${fmtFull(todayISO())}</div></div>
    <button class="icon-btn" id="qlX">✕</button>
  </div>`));
  const days=el(`<div class="qk-days">${Object.keys(G).map(k=>`<button class="qk-day ${logDay===k?"on":""}" data-d="${k}">${k}</button>`).join("")}</div>`);
  sheet.appendChild(days);
  sheet.appendChild(el(`<div style="font-size:12.5px;color:var(--ink-soft);margin:11px 2px 4px">${esc(tpl.name)}</div>`));
  const list=el(`<div class="qk" id="qlList"></div>`); sheet.appendChild(list);
  tpl.slots.forEach((slot,si)=>{
    const base=lastSummary(slot.mv[0].k);
    const opts=slot.mv.map((mm,i)=>`<option value="${i}">${esc(mm.nm)}${i>0?" (alt)":""}</option>`).join("")+`<option value="other">Other…</option>`;
    const block=el(`<div class="qk-ex" data-si="${si}">
      <div class="qk-ex-top"><span class="qk-name"><select class="ex-swap">${opts}</select></span><span class="qk-rx">${esc(slot.rx)}</span></div>
      <input type="text" class="ex-custom hidden" placeholder="Movement you did" style="margin:4px 0 6px">
      <div class="qk-last">${baseHTML(base)}</div>
      <div class="qk-lines"></div>
      <button class="qk-add" type="button">+ add set / weight change</button>
    </div>`);
    const lines=block.querySelector(".qk-lines");
    lines.appendChild(qkSet(base&&base.top?base.top:null));
    block.querySelector(".qk-add").onclick=()=>lines.appendChild(qkSet(null));
    const sel=block.querySelector(".ex-swap"),custom=block.querySelector(".ex-custom");
    sel.onchange=()=>{const useOther=sel.value==="other";custom.classList.toggle("hidden",!useOther);
      block.querySelector(".qk-last").innerHTML=useOther?"Custom movement — set your numbers.":baseHTML(lastSummary(slot.mv[+sel.value].k));if(useOther)custom.focus()};
    list.appendChild(block);
  });
  sheet.appendChild(el(`<label class="fld" style="margin-top:14px">Session notes</label>`));
  const notes=el(`<input type="text" id="qlNotes" placeholder="Gym, how it felt…">`); sheet.appendChild(notes);
  const saveBtn=el(`<button class="btn qk-save" id="qlSave" style="margin-top:14px">Save session</button>`); sheet.appendChild(saveBtn);
  sheet.querySelector("#qlX").onclick=closeQuickLog;
  days.querySelectorAll(".qk-day").forEach(b=>b.onclick=()=>{logDay=b.dataset.d;drawQuickLog(sheet)});
  saveBtn.onclick=()=>{
    const exercises=[];
    list.querySelectorAll(".qk-ex").forEach(block=>{
      const si=+block.dataset.si, slot=tpl.slots[si], lns=[];
      block.querySelectorAll(".qk-set").forEach(rw=>{
        const s=parseInt(rw.querySelector(".ls").value);
        const r=rw.querySelector(".lr").value.trim();
        const w=parseFloat(rw.querySelector(".lw").value);
        if(r||!isNaN(w))lns.push({s:isNaN(s)?1:s,r,w:isNaN(w)?0:w});
      });
      if(!lns.length)return;
      const sel=block.querySelector(".ex-swap"); let nm,k;
      if(sel.value==="other"){nm=block.querySelector(".ex-custom").value.trim()||slot.mv[0].nm;k=keyFor(nm)}
      else{const mm=slot.mv[+sel.value];nm=mm.nm;k=mm.k}
      exercises.push({k,nm,lines:lns});
    });
    if(!exercises.length){alert("Add at least one set to save.");return}
    state.training.gymLog.unshift({id:uid(),date:todayISO(),day:logDay,exercises,notes:notes.value.trim()});
    saveBtn.textContent="Saved ✓"; saveBtn.disabled=true;
    save(); setTimeout(()=>{closeQuickLog();render()},450);
  };
}

          <div class="block-pill">${calOffset===0?"● this week":calOffset===1?"next week":calOffset===-1?"last week":fmtFull(mon)}</div>
        </div>
        <button class="navb" id="calNext">›</button>
      </div>
      <div class="days" id="calDays"></div>
      <div class="wk-foot">
        <span>${calOffset===0?"Planning next week? Copy this one forward, then edit what changes.":""}</span>
        <button class="smallbtn" id="calCopy">Copy this week → next</button>
      </div>
    </div>
    <div id="reviewHost"></div>
  </div>`));
  const dc=root.querySelector("#calDays");
  const tpls=state.calendar.templates||[];
  DAYS.forEach((dn,i)=>{
    const iso=addDaysISO(mon,i),d=wk.days[i],isToday=iso===t,weekend=i>=5;
    const doneN=d.blocks.filter(b=>b.done).length,totN=d.blocks.length;
    const allDone=totN>0&&doneN===totN;
    const dupOpts=DAYS.map((dd,j)=>j===i?"":`<option value="${j}">${dd}</option>`).join("");
    const tplApply=tpls.length?`<select class="daytool tpl-apply"><option value="">Apply template…</option>${tpls.map(tp=>`<option value="${tp.id}">${esc(tp.name)}</option>`).join("")}</select>`:"";
    const card=el(`<div class="daycard ${isToday?"today":""} ${weekend?"weekend":""}">
      <div class="day-head">
        <div class="day-id"><span class="dn2">${dn}</span><span class="num2">${dayNum(mon,i)} ${fmtMon(mon)}</span>${isToday?`<span class="todaytag">Today</span>`:""}</div>
        <div class="day-tools">
          <span class="wake-mini">Wake <input type="time" value="${esc(d.wake||"")}">${weekend?`<em>relaxed</em>`:""}</span>
          ${totN?`<span class="donepill ${allDone?"alldone":""}">${doneN} / ${totN} done</span>`:""}
          <button class="daytool tplsave">Save as template</button>
          ${tplApply}
          <select class="daytool dupto"><option value="">Duplicate to…</option>${dupOpts}</select>
        </div>
      </div>
      <div class="blocks"></div>
      <button class="addblk">+ block</button>
    </div>`);
    card.querySelector(".wake-mini input").oninput=e=>{d.wake=e.target.value;save()};
    const bc=card.querySelector(".blocks");
    const untimed=d.blocks.filter(b=>!b.time);
    sortedBlocks(d).forEach(b=>bc.appendChild(calBlockRow(d,b,i,untimed)));
    card.querySelector(".addblk").onclick=()=>{
      d.blocks.push({id:uid(),time:"",type:weekend?"training":"work",label:"",done:false,cat:""});
      save();render();
    };
    card.querySelector(".tplsave").onclick=()=>{
      const name=prompt("Name this template:",weekend?"Typical weekend":"Typical weekday");
      if(!name)return;
      state.calendar.templates.push({id:uid(),name:name.trim(),wake:d.wake,
        blocks:d.blocks.map(b=>({time:b.time,type:b.type,label:b.label,cat:b.cat||""}))});
      save();render();
    };
    const ta=card.querySelector(".tpl-apply");
    if(ta)ta.onchange=()=>{
      const tp=tpls.find(x=>x.id===ta.value);if(!tp)return;
      if(d.blocks.length&&!confirm(`Replace ${dn}'s ${d.blocks.length} block${d.blocks.length===1?"":"s"} with "${tp.name}"?`)){ta.value="";return}
      d.wake=tp.wake||d.wake;
      d.blocks=tp.blocks.map(b=>({id:uid(),time:b.time,type:b.type,label:b.label,done:false,cat:b.cat||""}));
      save();render();
    };
    card.querySelector(".dupto").onchange=e=>{
      const j=+e.target.value;if(isNaN(j)||e.target.value==="")return;
      const tgt=wk.days[j];
      if(tgt.blocks.length&&!confirm(`Overwrite ${DAYS[j]}'s blocks with a copy of ${dn}?`)){e.target.value="";return}
      tgt.blocks=d.blocks.map(b=>({id:uid(),time:b.time,type:b.type,label:b.label,done:false,cat:b.cat||""}));
      save();render();
    };
    dc.appendChild(card);
  });
  buildCalSpotlight(root.querySelector("#spotHost"),mon,wk,t);
  root.querySelector("#calPrev").onclick=()=>{calOffset--;calSpot=null;render()};
  root.querySelector("#calNext").onclick=()=>{calOffset++;calSpot=null;render()};
  root.querySelector("#calCopy").onclick=()=>{
    const next=addDaysISO(mon,7);
    if(state.calendar.weeks[next]&&!confirm("Next week already has a plan — overwrite it with a copy of this week?"))return;
    state.calendar.weeks[next]=clone(wk);
    state.calendar.weeks[next].days.forEach(day=>day.blocks.forEach(b=>b.id=uid()));
    calOffset++;calSpot=null;save();render();
  };
  root.querySelector("#reviewHost").appendChild(reviewCard());
}

/* ---------- calendar spotlight: today big, the rest as tappable minis ---------- */
function calDayShape(d){
  // returns {wake, blocks:[...]} display helpers for a day object
  return d;
}
function buildCalSpotlight(host,mon,wk,t){
  const todayIdx=DAYS.findIndex((_,i)=>addDaysISO(mon,i)===t);
  const viewingThisWeek=todayIdx>=0;
  // which day sits in the spotlight: explicit pick, else today, else first day
  let spotIdx = calSpot!==null ? calSpot : (viewingThisWeek?todayIdx:0);
  if(spotIdx<0||spotIdx>6)spotIdx=0;
  const d=wk.days[spotIdx], iso=addDaysISO(mon,spotIdx), isToday=iso===t;
  const relaxed=spotIdx>=5;
  const named=sortedBlocks(d).filter(b=>(b.label||"").trim());
  const blocksHTML=named.length
    ? `<div class="spot-blocks">${named.map(b=>`<span class="spot-blk bt-${esc(b.type)} ${b.done?"done":""}">${b.time?`<b>${esc(b.time)}</b> `:""}${esc(b.label)}</span>`).join("")}</div>`
    : `<div class="spot-empty">No blocks yet — ${relaxed?"a relaxed day.":"add them in the planner below."}</div>`;
  const wakeHTML = d.wake
    ? `wake <b>${esc(d.wake)}</b>`
    : (relaxed?`<span style="opacity:.7">relaxed start</span>`:`<span style="opacity:.7">no wake set</span>`);

  const card=el(`<div class="card spotlight">
    <div class="spot-hero">
      <div class="spot-daymark">
        <div class="spot-lbl">${isToday?"Today":relaxed?"Weekend":"Day"}</div>
        <div class="spot-day">${DAYS[spotIdx]}<span class="spot-num">${dayNum(mon,spotIdx)}</span></div>
        <div class="spot-wake">${wakeHTML}</div>
      </div>
      <div class="spot-body">
        <div class="eyebrow-lite">The shape of ${isToday?"today":"the day"}</div>
        ${blocksHTML}
      </div>
    </div>
    <div class="mini-strip" id="miniStrip"></div>
  </div>`);

  const strip=card.querySelector("#miniStrip");
  DAYS.forEach((dn,i)=>{
    const di=wk.days[i], isSpot=i===spotIdx, dIso=addDaysISO(mon,i), isTod=dIso===t;
    const dots=sortedBlocks(di).slice(0,5).map(b=>`<span class="mini-dot bt-${esc(b.type)} ${b.done?"mdone":""}"></span>`).join("")||`<span class="mini-dot none"></span>`;
    const m=el(`<button class="mini ${isSpot?"on":""} ${isTod?"istoday":""}">
      <span class="mini-d">${dn}<span class="mini-n">${dayNum(mon,i)}</span></span>
      <span class="mini-wk">${di.wake?esc(di.wake):(i>=5?"—":"·")}</span>
      <span class="mini-dots">${dots}</span>
    </button>`);
    m.onclick=()=>{calSpot=i;render()};
    strip.appendChild(m);
  });
  host.appendChild(card);
}

/* ---------- bucket trend arrow: this month vs last ---------- */
function trendArrow(cur,prev){
  if(prev<=0&&cur<=0)return"";
  if(prev<=0)return `<span style="font-size:11px;color:var(--ink-faint)" title="no spend last month">new</span>`;
  const r=cur/prev;
  if(r>1.1)return `<span style="font-size:11px;color:var(--danger)" title="up vs last month">▲</span>`;
  if(r<0.9)return `<span style="font-size:11px;color:var(--d-run)" title="down vs last month">▼</span>`;
  return `<span style="font-size:11px;color:var(--ink-faint)" title="flat vs last month">▶</span>`;
}

/* ---------- weekly review — the compounding view ---------- */
function reviewCard(){
  const mon=mondayOf(todayISO()),ph=currentPhase();
  let trainStr;
  if(ph===1){
    const i=currentWkIdx(),w=SCHEDULE[i];
    const tot=w.days.filter(d=>isTrainable(d.disc)).length;
    const done=w.days.filter((d,di)=>isTrainable(d.disc)&&state.training.schedule[`${i}-${di}`]==="done").length;
    trainStr=`${done}/${tot} planned sessions ticked${state.training.schedule[`${i}-mob`]==="done"?" · mobility ✓":""}`;
  }else{
    const c=weekCounts(mon),q=state.training.quota;
    trainStr=`gym ${c.gym}/${q.gym} · swim ${c.swim}/${q.swim} · bike ${c.bike}/${q.bike} · mobility ${c.mob}/${q.mobility} · faith ${c.faith}/${q.faith}${c.z2?` · Z2 ${c.z2}min`:""}`;
  }
  const H=state.habits;let tk=0,poss=0;
  for(let d=mon;d<=todayISO();d=addDaysISO(d,1)){const l=H.log[d]||{};H.list.forEach(h=>{if(!habitApplies(h,d))return;poss++;if(l[h.id])tk++})}
  const hab=poss?Math.round(tk/poss*100):0;
  const mk=todayISO().slice(0,7);
  const spent=spentIn(mk),bud=bucketBudgetTotal();
  const unpl=state.money.spend.filter(s=>monthKeyOf(s.date)===mk&&s.planned===false).reduce((t2,s)=>t2+num(s.amount),0);
  const card=el(`<div class="card">
    <h2>Weekly review</h2>
    <p class="lead">The Sunday glance — training, habits and money in one place. This is where compounding shows itself.</p>
    <div class="dl"><span>Training · week of ${fmtDate(mon)}</span><span class="figure" style="text-align:right">${trainStr}</span></div>
    <div class="dl"><span>Habit adherence this week</span><span class="figure">${hab}%</span></div>
    <div class="dl"><span>Spend this month</span><span class="figure">${gbp(spent)}${bud>0?` / ${gbp(bud)} budget`:""}</span></div>
    <div class="dl"><span>Unplanned spend this month</span><span class="figure" style="color:${unpl>0?"var(--danger)":"var(--d-run)"}">${gbp(unpl)}</span></div>
  </div>`);
  return card;
}
