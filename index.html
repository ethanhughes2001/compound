<!-- Compound · Training + Money — one system, shared storage, versioned schema -->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1B2A4A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Compound" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231B2A4A'/%3E%3Ctext x='50%25' y='54%25' font-family='Georgia,serif' font-size='104' fill='%23C8923A' text-anchor='middle' dominant-baseline='middle'%3EC%3C/text%3E%3C/svg%3E" />
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Compound%22%2C%22short_name%22%3A%22Compound%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23EFF2F6%22%2C%22theme_color%22%3A%22%231B2A4A%22%2C%22icons%22%3A%5B%5D%7D" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#EFF2F6;
    --surface:#FFFFFF;
    --surface-2:#F7F8FB;
    --ink:#14203A;
    --ink-soft:#56607A;
    --ink-faint:#8A93A8;
    --line:#E2E6EE;
    --line-strong:#CDD3DF;
    --navy:#1B2A4A;
    --gold:#C8923A;
    --gold-soft:#F6ECD6;
    /* training discipline accents */
    --d-gym:#3B4E7E;   --d-gym-s:#E6EAF3;
    --d-swim:#157E96;  --d-swim-s:#DDF0F4;
    --d-bike:#C2761B;  --d-bike-s:#F8ECD9;
    --d-run:#2E8B57;   --d-run-s:#DFF1E7;
    --d-brick:#7A4E9E; --d-brick-s:#EEE6F5;
    --d-rest:#8A93A8;  --d-rest-s:#ECEEF2;
    --d-hol:#4FA3C7;   --d-hol-s:#E0F0F7;
    --d-race:#B8412E;  --d-race-s:#F8E2DD;
    --d-mob:#4A6B8A;   --d-mob-s:#E4EBF2;
    /* money accents */
    --buffer:#1F7A63;      --buffer-s:#E3F0EB;  --buffer-deep:#155544;
    --invest:#BE8A2E;      --invest-s:#F6ECD6;  --invest-deep:#8A6418;
    --goal:#3B4E7E;        --goal-s:#E6EAF3;
    --spend:#8A4B5E;       --spend-s:#F4E5EA;   --spend-deep:#6E3648;
    --expense:#6B7280;
    --danger:#B0473A;
    --radius:14px;
    --f-display:"Fraunces",serif;
    --f-body:"Inter",system-ui,sans-serif;
    --f-mono:"IBM Plex Mono",monospace;
    --on-ink:#FFFFFF;
    --on-ink-soft:#cdd6e6;
    --hover:#EEF1F7;
    --chip-neutral:#EEF0F2;
    --danger-soft:#FBEEEC;
    --danger-deep:#8E352B;
    --warn-border:#E8C9C3;
    --btn-bg:var(--ink);
    --btn-hover:#000000;
    --shadow:0 1px 2px rgba(20,32,58,.04), 0 8px 24px rgba(20,32,58,.07);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--f-body);line-height:1.5;-webkit-font-smoothing:antialiased;padding:clamp(14px,3.5vw,36px)}
  .wrap{max-width:900px;margin:0 auto}
  .figure{font-family:var(--f-mono);letter-spacing:-.02em}
  .hidden{display:none}

  /* ---- shell: wordmark + module switcher ---- */
  .shell-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .wordmark{font-family:var(--f-display);font-weight:600;font-size:17px;letter-spacing:.01em;display:flex;align-items:center;gap:9px}
  .wordmark .mark{width:22px;height:22px;border-radius:6px;background:var(--navy);display:inline-flex;align-items:center;justify-content:center;color:var(--on-ink);font-family:var(--f-mono);font-size:12px;font-weight:600}
  .modules{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line-strong);border-radius:11px;padding:4px}
  .mod{border:none;background:none;border-radius:8px;padding:8px 16px;font-family:var(--f-body);font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .mod.on{background:var(--navy);color:var(--on-ink)}
  .mod:not(.on):hover{color:var(--ink)}

  /* ---- shared header pattern ---- */
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-family:var(--f-display);font-weight:600;font-size:clamp(26px,5vw,38px);letter-spacing:-.01em;margin:0 0 3px;line-height:1.05}
  header p{margin:0;color:var(--ink-soft);font-size:14px;max-width:52ch}
  .countdown{display:flex;flex-direction:column;align-items:flex-end;text-align:right}
  .countdown .big{font-family:var(--f-mono);font-weight:600;font-size:clamp(30px,7vw,46px);line-height:.95;color:var(--navy)}
  .countdown .lbl{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}

  /* ---- training: week strip ---- */
  .strip{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
  .strip .row{display:flex;gap:5px;align-items:stretch}
  .seg{flex:1;border:none;cursor:pointer;background:var(--surface-2);border-radius:7px;padding:9px 2px 7px;text-align:center;transition:.15s;min-width:0;border:1px solid transparent}
  .seg:hover{background:var(--hover)}
  .seg .n{font-family:var(--f-mono);font-size:13px;font-weight:600;color:var(--ink-soft);line-height:1}
  .seg .ph{font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seg.active{background:var(--navy);border-color:var(--navy)}
  .seg.active .n{color:var(--on-ink)}.seg.active .ph{color:var(--on-ink-soft)}
  .seg.race{background:var(--gold-soft);border-color:var(--gold)}
  .seg.race .n{color:var(--gold)}.seg.race .ph{color:var(--gold)}
  .seg.done-wk::after{content:"";display:block;height:3px;border-radius:2px;background:var(--d-run);margin:5px 5px 0}
  .strip .cap{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-top:9px}

  /* ---- tabs (shared pattern) ---- */
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tab{flex:1;border:1px solid var(--line-strong);background:var(--surface);border-radius:11px;padding:11px;font-family:var(--f-body);font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .tab:hover{border-color:var(--navy)}
  .tab.on{background:var(--navy);border-color:var(--navy);color:var(--on-ink)}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:14px}
  .card h2{font-family:var(--f-display);font-weight:500;font-size:20px;margin:0 0 2px;letter-spacing:-.01em}
  .card .lead{color:var(--ink-soft);font-size:13.5px;margin:0 0 16px}

  /* ---- training: week view ---- */
  .wk-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}
  .navb{border:1px solid var(--line-strong);background:var(--surface);width:34px;height:34px;border-radius:9px;cursor:pointer;color:var(--ink-soft);font-size:17px;display:flex;align-items:center;justify-content:center}
  .navb:hover{border-color:var(--navy);color:var(--navy)}
  .navb:disabled{opacity:.35;cursor:not-allowed}
  .block-pill{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint)}
  .days{display:flex;flex-direction:column;gap:8px;margin-top:14px}
  .day{display:grid;grid-template-columns:46px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-left-width:4px;border-radius:11px;padding:11px 13px;background:var(--surface)}
  .day.today{box-shadow:0 0 0 2px var(--navy)}
  .day.mobweek{margin-top:10px;background:var(--surface-2);border-style:dashed}
  .mob-flag{margin-top:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .flagrow{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);cursor:pointer}
  .flagrow input{width:17px;height:17px;accent-color:var(--d-race);flex:none}
  #mPopNote{margin-top:10px}
  #mPopNote.hidden{display:none}
  .pop-warn{margin-top:14px;background:var(--d-race-s);border:1px solid var(--warn-border);color:var(--danger);border-radius:10px;padding:11px 13px;font-size:13px;line-height:1.45}
  .day .dn{font-size:12px;font-weight:600;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em}
  .day .dn .num{display:block;font-family:var(--f-mono);font-size:15px;color:var(--ink);font-weight:500;margin-top:2px}
  .day .body .ttl{font-size:14.5px;font-weight:600}
  .day .body .det{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .day .marks{display:flex;gap:5px}
  .mk{border:1px solid var(--line-strong);background:var(--surface);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--ink-faint);display:flex;align-items:center;justify-content:center;transition:.12s}
  .mk.done.on{background:var(--d-run);border-color:var(--d-run);color:var(--on-ink)}
  .mk.miss.on{background:var(--danger);border-color:var(--danger);color:var(--on-ink)}
  .mk:hover{border-color:var(--ink-soft)}
  .disc-tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:3px}
  .acts{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .act-chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px}
  .act-chip::before{content:"●";font-size:7px}
  .wk-foot{margin-top:14px;padding-top:13px;border-top:1px solid var(--line);font-size:13px;color:var(--ink-soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

  /* ---- forms (shared) ---- */
  .seg-pick{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .pick{border:1px solid var(--line-strong);background:var(--surface);border-radius:9px;padding:8px 14px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.12s}
  .pick:hover{border-color:var(--navy)}
  .pick.on{background:var(--ink);border-color:var(--ink);color:var(--on-ink)}
  label.fld{display:block;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 6px}
  input[type=text],input[type=number],input[type=date],select{width:100%;font-family:var(--f-body);font-size:14.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;outline:none;transition:.15s}
  input:focus,select:focus{border-color:var(--navy);box-shadow:0 0 0 3px var(--d-gym-s)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.grid2{grid-template-columns:1fr}}
  .money-input{position:relative}
  .money-input span.cur{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:14px;pointer-events:none}
  .money-input input{padding-left:26px;font-family:var(--f-mono)}
  .btn{width:100%;border:none;cursor:pointer;background:var(--btn-bg);color:var(--on-ink);border-radius:11px;padding:13px;font-family:var(--f-body);font-size:14.5px;font-weight:600;transition:.18s;margin-top:6px}
  .btn:hover{background:var(--btn-hover);transform:translateY(-1px)}
  .btn:disabled{background:var(--line-strong);transform:none;cursor:not-allowed}
  .divider{height:1px;background:var(--line);margin:16px 0}
  .ok{font-size:13px;color:var(--d-run);font-weight:600;margin-top:10px;display:none}
  .icon-btn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-faint);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;transition:.15s;flex:none}
  .icon-btn:hover{border-color:var(--danger);color:var(--danger)}
  .icon-btn.up:hover,.icon-btn.dn2:hover{border-color:var(--navy);color:var(--navy)}
  .add-dash{margin-top:10px;background:none;border:1px dashed var(--line-strong);color:var(--ink-soft);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;width:100%;transition:.15s}
  .add-dash:hover{border-color:var(--navy);color:var(--navy)}

  /* ---- training: log ---- */
  .ex-block{border:1px solid var(--line);border-radius:11px;padding:13px 14px;margin-bottom:11px;background:var(--surface-2)}
  .ex-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
  .ex-head .rx{font-size:11.5px;color:var(--ink-faint);font-family:var(--f-mono);flex:none}
  .ex-swap{flex:1;min-width:0;font-size:14.5px;font-weight:600;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 10px;cursor:pointer}
  .ex-swap:focus{border-color:var(--d-gym);box-shadow:0 0 0 3px var(--d-gym-s)}
  .ex-custom{margin-bottom:10px;font-family:var(--f-body)}
  .ex-custom.hidden{display:none}
  .lines{display:flex;flex-direction:column;gap:7px}
  .set-line{display:flex;align-items:center;gap:7px}
  .set-line input{padding:8px 9px;font-family:var(--f-mono);text-align:center;background:var(--surface)}
  .set-line .ls{width:58px}.set-line .lr{width:62px}.set-line .lw{width:72px}
  .set-line .op{color:var(--ink-faint);font-weight:600;font-size:14px}
  .set-line .unit{color:var(--ink-faint);font-size:12px}
  .set-line .line-rm{margin-left:auto;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-faint);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;flex:none}
  .set-line .line-rm:hover{border-color:var(--danger);color:var(--danger)}
  .add-line{margin-top:9px;background:none;border:1px dashed var(--line-strong);color:var(--ink-soft);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:500;cursor:pointer;width:100%}
  .add-line:hover{border-color:var(--d-gym);color:var(--d-gym)}

  /* ---- training: progress ---- */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  @media(max-width:560px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
  .stat{border:1px solid var(--line);border-radius:11px;padding:13px 14px;background:var(--surface-2)}
  .stat .v{font-family:var(--f-mono);font-size:24px;font-weight:600}
  .stat .k{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:5px}
  .stat .k .tag{width:8px;height:8px;border-radius:2px}
  .adh-bar{height:9px;border-radius:6px;background:var(--d-run-s);overflow:hidden;margin:14px 0 6px}
  .adh-bar>span{display:block;height:100%;background:var(--d-run);border-radius:6px;transition:width .5s}
  .lift{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line)}
  .lift:last-child{border-bottom:none}
  .lift .nm{font-size:14.5px;font-weight:600}
  .lift .rx{font-size:11.5px;color:var(--ink-faint);font-family:var(--f-mono)}
  .lift .best{font-family:var(--f-mono);font-size:19px;font-weight:600}
  .lift .best small{font-size:12px;color:var(--ink-faint);font-weight:400}
  .lift .editb{border:1px solid var(--line-strong);background:var(--surface);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;color:var(--ink-soft)}
  .lift .editb:hover{border-color:var(--navy);color:var(--navy)}
  .feed-row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--line)}
  .feed-row:last-child{border-bottom:none}
  .feed-row .dt{font-family:var(--f-mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}
  .feed-row .desc .h{font-size:14px;font-weight:600}
  .feed-row .desc .s{font-size:12.5px;color:var(--ink-soft)}
  .del{border:none;background:none;color:var(--ink-faint);cursor:pointer;font-size:17px;padding:4px 7px;border-radius:8px}
  .del:hover{color:var(--danger);background:var(--d-race-s)}
  .caret{font-size:11px;color:var(--ink-faint);margin-left:6px}
  .feed-detail{padding:4px 2px 12px}
  .feed-detail.hidden{display:none}
  .dl-head{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);margin:2px 0 8px}
  .dl{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:5px 0;border-bottom:1px dotted var(--line)}
  .dl span:first-child{color:var(--ink-soft)}
  .dl-note{font-size:12.5px;color:var(--ink-soft);font-style:italic;margin-top:9px;padding:8px 11px;background:var(--surface-2);border-radius:8px}
  .empty{text-align:center;color:var(--ink-faint);font-size:14px;padding:26px 12px}

  /* ---- money: hero pots ---- */
  .m-hero{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:620px){.m-hero{grid-template-columns:1fr}}
  .pot{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .pot .eyebrow{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .pot .eyebrow .tag{width:9px;height:9px;border-radius:3px;flex:none}
  .pot .figure{font-size:clamp(24px,5.5vw,34px);font-weight:500}
  .pot .sub{font-size:12.5px;color:var(--ink-soft);margin-top:7px}
  .pot.invest{background:linear-gradient(180deg,var(--invest-s) 0%,var(--surface) 70%)}
  .bar{height:9px;border-radius:6px;background:var(--buffer-s);margin-top:13px;overflow:hidden}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--buffer),var(--buffer-deep));border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
  .bar.gold>span{background:linear-gradient(90deg,var(--invest),var(--invest-deep))}
  .bar.slate{background:var(--goal-s)}
  .bar.slate>span{background:linear-gradient(90deg,var(--goal),var(--navy))}
  .bar.rose{background:var(--spend-s)}
  .bar.rose>span{background:linear-gradient(90deg,var(--spend),var(--spend-deep))}
  .bar.over>span{background:linear-gradient(90deg,var(--danger),var(--danger-deep))}
  .bar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:7px}

  /* ---- money: buckets & goals ---- */
  .bucket{padding:12px 2px;border-bottom:1px solid var(--line)}
  .bucket:last-child{border-bottom:none}
  .bucket .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .bucket .nm{font-size:14px;font-weight:600}
  .bucket .amt{font-family:var(--f-mono);font-size:14px;white-space:nowrap}
  .bucket .amt small{color:var(--ink-faint);font-weight:400}
  .bucket.over .amt{color:var(--danger)}
  .chip{font-size:11px;padding:2px 8px;border-radius:999px;font-family:var(--f-mono);white-space:nowrap}
  .chip.exp{background:var(--chip-neutral);color:var(--expense)}
  .chip.buf{background:var(--buffer-s);color:var(--buffer-deep)}
  .chip.inv{background:var(--invest-s);color:var(--invest-deep)}
  .chip.goa{background:var(--goal-s);color:var(--navy)}
  .chip.spn{background:var(--spend-s);color:var(--spend-deep)}
  .chip.warn{background:var(--d-race-s);color:var(--danger)}
  .chip.good{background:var(--d-run-s);color:var(--d-run)}
  .bucket-chips{display:flex;gap:6px;flex-wrap:wrap}
  .bchip{border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.12s}
  .bchip:hover{border-color:var(--spend);color:var(--spend)}
  .bchip.on{background:var(--spend);border-color:var(--spend);color:var(--on-ink)}
  .goal-row{border:1px solid var(--line);border-radius:11px;padding:14px 15px;background:var(--surface-2);margin-bottom:10px}
  .goal-row .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
  .goal-row .nm{font-size:15px;font-weight:600}
  .goal-row .meta{font-size:12px;color:var(--ink-faint);font-family:var(--f-mono);white-space:nowrap}
  .goal-row .pace{font-size:12.5px;margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .goal-actions{display:flex;gap:6px;margin-top:10px}
  .waterfall{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .wf-row{display:grid;grid-template-columns:1fr 130px;gap:10px;align-items:center;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--surface-2)}
  .wf-row .lab{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .wf-row .lab .tag{width:8px;height:8px;border-radius:2px;flex:none}
  .wf-row .lab small{font-weight:400;color:var(--ink-faint);font-size:11.5px}
  .wf-row input{padding:8px 10px;padding-left:24px;font-size:14px}
  .wf-note{font-size:12px;color:var(--ink-faint);margin-top:10px}
  .shortfall{background:var(--danger-soft);border:1px solid var(--warn-border);color:var(--danger);border-radius:11px;padding:12px 14px;font-size:13.5px;margin-top:14px;display:none}
  .m-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
  @media(max-width:560px){.m-stat-grid{grid-template-columns:1fr 1fr}}
  .settings-toggle{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-weight:500;padding:0}
  .settings-toggle:hover{color:var(--ink)}
  .mon-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
  .mon-nav .mon{font-family:var(--f-mono);font-size:14px;font-weight:600;min-width:110px;text-align:center}

  .foot{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .smallbtn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);border-radius:9px;padding:9px 14px;font-size:12.5px;font-weight:500;cursor:pointer}
  .smallbtn:hover{border-color:var(--navy);color:var(--navy)}
  .smallbtn.danger:hover{border-color:var(--danger);color:var(--danger)}
  .disclaimer{font-size:11.5px;color:var(--ink-faint);max-width:42ch}
  .loading{text-align:center;padding:80px;color:var(--ink-faint)}
  /* =====================================================================
     THEMES — Ledger is :root. Stillwater re-skins; data-mode=dark flips each.
     ===================================================================== */
  body[data-skin="stillwater"]{
    --paper:#F1F2EE;--surface:#FFFFFF;--surface-2:#F6F7F3;
    --ink:#23281F;--ink-soft:#5D6455;--ink-faint:#93998A;
    --line:#ECEDE7;--line-strong:#DFE1DA;
    --navy:#3E4A38;--gold:#B8935A;--gold-soft:#F2EADC;
    --d-gym:#5F6E8C;--d-gym-s:#E9ECF2;--d-swim:#5B8FA3;--d-swim-s:#E5EFF3;
    --d-bike:#B8935A;--d-bike-s:#F4ECDF;--d-run:#5C7D58;--d-run-s:#E7EFE4;
    --d-brick:#8A7BA3;--d-brick-s:#EEEAF4;--d-rest:#93998A;--d-rest-s:#EEEFEA;
    --d-hol:#6FA3B8;--d-hol-s:#E6F1F5;--d-race:#B0584A;--d-race-s:#F6E7E3;
    --d-mob:#7A9B76;--d-mob-s:#E9F0E7;
    --danger:#B0584A;--danger-soft:#F6E7E3;--danger-deep:#8E4437;--warn-border:#E5CCC5;
    --buffer:#5C7D58;--buffer-soft:#E7EFE4;--buffer-deep:#42603F;
    --invest:#B8935A;--invest-soft:#F2EADC;--invest-deep:#8A6C3C;--expense:#8A9084;
    --hover:#EEF0EA;--chip-neutral:#EDEEE8;
    --radius:20px;
    --shadow:0 2px 6px rgba(35,40,31,.05),0 14px 34px rgba(35,40,31,.06);
    --f-display:"Sora",sans-serif;--f-body:"Sora",system-ui,sans-serif;
  }
  body[data-mode="dark"]{
    --paper:#101623;--surface:#171F2E;--surface-2:#1C2536;
    --ink:#E9EDF6;--ink-soft:#9AA6C0;--ink-faint:#5F6B88;
    --line:#26314A;--line-strong:#33405C;
    --navy:#D9A54A;--on-ink:#171207;--on-ink-soft:#4A3A17;
    --gold:#D9A54A;--gold-soft:rgba(217,165,74,.15);
    --d-gym:#8AA0D6;--d-gym-s:rgba(138,160,214,.15);--d-swim:#4FBCD6;--d-swim-s:rgba(79,188,214,.15);
    --d-bike:#E0A050;--d-bike-s:rgba(224,160,80,.15);--d-run:#43B380;--d-run-s:rgba(67,179,128,.16);
    --d-brick:#A98BD6;--d-brick-s:rgba(169,139,214,.15);--d-rest:#5F6B88;--d-rest-s:rgba(95,107,136,.18);
    --d-hol:#5FB7DB;--d-hol-s:rgba(95,183,219,.15);--d-race:#E06A5A;--d-race-s:rgba(224,106,90,.16);
    --d-mob:#7FA3C4;--d-mob-s:rgba(127,163,196,.15);
    --danger:#E06A5A;--danger-soft:rgba(224,106,90,.14);--danger-deep:#C8564A;--warn-border:rgba(224,106,90,.35);
    --buffer:#43B380;--buffer-soft:rgba(67,179,128,.14);--buffer-deep:#7FD4AC;
    --invest:#D9A54A;--invest-soft:rgba(217,165,74,.14);--invest-deep:#E7C384;--expense:#8B93A5;
    --hover:#1E2839;--chip-neutral:#242E42;
    --btn-bg:#D9A54A;--btn-hover:#E5B765;
    --shadow:none;
  }
  body[data-skin="stillwater"][data-mode="dark"]{
    --paper:#161A16;--surface:#1D221D;--surface-2:#222822;
    --ink:#E8EAE3;--ink-soft:#A6AC9C;--ink-faint:#6E7565;
    --line:#272D27;--line-strong:#333A32;
    --navy:#8FB289;--on-ink:#131711;--on-ink-soft:#2C3A29;
    --gold:#C9A36B;--gold-soft:rgba(201,163,107,.15);
    --d-gym:#93A3C4;--d-gym-s:rgba(147,163,196,.15);--d-swim:#7FB7C9;--d-swim-s:rgba(127,183,201,.15);
    --d-bike:#C9A36B;--d-bike-s:rgba(201,163,107,.15);--d-run:#8FB289;--d-run-s:rgba(143,178,137,.17);
    --d-brick:#A797C4;--d-brick-s:rgba(167,151,196,.15);--d-rest:#6E7565;--d-rest-s:rgba(110,117,101,.2);
    --d-hol:#84B4C6;--d-hol-s:rgba(132,180,198,.15);--d-race:#D08070;--d-race-s:rgba(208,128,112,.16);
    --d-mob:#8FB289;--d-mob-s:rgba(143,178,137,.15);
    --danger:#D08070;--danger-soft:rgba(208,128,112,.14);--danger-deep:#B96A5B;--warn-border:rgba(208,128,112,.35);
    --buffer:#8FB289;--buffer-soft:rgba(143,178,137,.15);--buffer-deep:#B4D3AE;
    --invest:#C9A36B;--invest-soft:rgba(201,163,107,.14);--invest-deep:#DFC49A;--expense:#8B9184;
    --hover:#232923;--chip-neutral:#2A302A;
    --btn-bg:#8FB289;--btn-hover:#A3C29D;
    --radius:20px;--shadow:none;
  }
  .skinctl{display:flex;gap:6px;align-items:center}
  .skinctl .smallbtn{padding:8px 12px}

  /* ---- calendar spotlight ---- */
  .eyebrow-lite{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
  .spotlight{padding:20px 22px}
  .spot-hero{display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
  .spot-daymark{border-left:4px solid var(--navy);padding-left:15px;min-width:96px}
  .spot-daymark .spot-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint)}
  .spot-day{font-family:var(--f-display);font-weight:500;font-size:26px;line-height:1.05;margin-top:3px;display:flex;align-items:baseline;gap:8px}
  .spot-day .spot-num{font-family:var(--f-mono);font-size:16px;color:var(--ink-soft);font-weight:500}
  .spot-wake{font-size:12px;color:var(--ink-faint);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:6px}
  .spot-wake b{font-family:var(--f-mono);color:var(--ink);font-weight:600;letter-spacing:0}
  .spot-blocks{display:flex;gap:8px;flex-wrap:wrap}
  .spot-blk{font-size:13.5px;font-weight:600;padding:8px 13px;border-radius:9px;border-left:3px solid var(--ink-faint)}
  .spot-blk.bt-work{border-left-color:var(--navy);background:var(--d-gym-s);color:var(--navy)}
  .spot-blk.bt-training{border-left-color:var(--d-run);background:var(--d-run-s);color:var(--d-run)}
  .spot-blk.bt-faith{border-left-color:var(--gold);background:var(--gold-soft);color:var(--invest-deep)}
  .spot-blk.bt-break{border-left-color:var(--d-swim);background:var(--d-swim-s);color:var(--d-swim)}
  .spot-blk.bt-personal{border-left-color:var(--d-brick);background:var(--d-brick-s);color:var(--d-brick)}
  .spot-blk.bt-meal{border-left-color:var(--d-bike);background:var(--d-bike-s);color:var(--d-bike)}
  .spot-blk.bt-other{border-left-color:var(--ink-faint);background:var(--surface-2);color:var(--ink-soft)}
  .spot-blk b{font-family:var(--f-mono);font-weight:600}
  .spot-blk.done{opacity:.5;text-decoration:line-through}
  .spot-empty{font-size:13px;color:var(--ink-faint);padding:6px 0}
  .mini-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
  @media(max-width:620px){.mini-strip{grid-template-columns:repeat(4,1fr)}}
  .mini{border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 6px 8px;cursor:pointer;text-align:center;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:5px}
  .mini:hover{border-color:var(--navy)}
  .mini.on{border-color:var(--navy);box-shadow:0 0 0 2px var(--navy);background:var(--surface-2)}
  .mini.istoday .mini-d{color:var(--d-run)}
  .mini-d{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-faint)}
  .mini-n{font-family:var(--f-mono);font-size:13px;color:var(--ink);font-weight:500;margin-left:4px}
  .mini-wk{font-family:var(--f-mono);font-size:10.5px;color:var(--ink-soft)}
  .mini-dots{display:flex;gap:3px;min-height:8px}
  .mini-dot{width:7px;height:7px;border-radius:2px;background:var(--ink-faint)}
  .mini-dot.bt-work{background:var(--navy)}
  .mini-dot.bt-training{background:var(--d-run)}
  .mini-dot.bt-faith{background:var(--gold)}
  .mini-dot.bt-break{background:var(--d-swim)}
  .mini-dot.bt-personal{background:var(--d-brick)}
  .mini-dot.bt-meal{background:var(--d-bike)}
  .mini-dot.bt-other{background:var(--ink-faint)}
  .mini-dot.mdone{outline:1.5px solid var(--d-run);outline-offset:1px}
  .mini-dot.none{background:var(--line-strong);border-radius:50%}

  /* ---- today strip / habits ---- */
  .hchip{border:1px solid var(--line-strong);background:var(--surface);border-radius:999px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.12s}
  .hchip:hover{border-color:var(--d-run);color:var(--d-run)}
  .hchip.on{background:var(--d-run);border-color:var(--d-run);color:var(--on-ink)}
  /* ---- calendar planner (redesign) ---- */
  .daycard{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px}
  .daycard.today{box-shadow:var(--shadow),0 0 0 2px var(--navy)}
  .daycard.weekend{background:var(--surface-2)}
  .day-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .day-id{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .day-id .dn2{font-family:var(--f-display);font-size:18px;font-weight:500;letter-spacing:-.01em}
  .day-id .num2{font-family:var(--f-mono);font-size:12px;color:var(--ink-soft)}
  .todaytag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--d-run);background:var(--d-run-s);border-radius:5px;padding:2px 7px}
  .day-tools{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .wake-mini{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);border:1px solid var(--line);border-radius:8px;padding:4px 9px}
  .wake-mini input{width:66px;border:none;background:none;font-family:var(--f-mono);font-size:13px;color:var(--ink);padding:0;outline:none}
  .wake-mini em{font-style:normal;text-transform:none;letter-spacing:0;font-weight:400;color:var(--ink-faint)}
  .donepill{font-size:11.5px;font-weight:600;font-family:var(--f-mono);color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px 10px}
  .donepill.alldone{background:var(--d-run-s);border-color:var(--d-run);color:var(--d-run)}
  .daytool{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);border-radius:8px;padding:5px 9px;font-size:11.5px;font-weight:500;cursor:pointer;font-family:var(--f-body)}
  .daytool:hover{border-color:var(--navy);color:var(--navy)}
  select.daytool{padding-right:6px;max-width:150px}
  .blocks{display:flex;flex-direction:column;gap:2px}
  .blk{display:grid;grid-template-columns:82px 4px 1fr auto;gap:9px;align-items:center;padding:3px 0}
  .blk .time input{width:100%;border:1px solid transparent;background:none;font-family:var(--f-mono);font-size:12.5px;color:var(--ink-soft);text-align:left;padding:5px 4px;min-width:74px;border-radius:6px;outline:none}
  .blk .time input:hover,.blk .time input:focus{border-color:var(--line);background:var(--surface-2)}
  .blk .spine{align-self:stretch;border-radius:3px;margin:4px 0;min-height:22px}
  .blk .main{position:relative;display:flex;align-items:center;gap:9px;min-width:0;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:6px 10px}
  .blk .dot{width:15px;height:15px;border-radius:5px;flex:none;cursor:pointer;border:none;padding:0}
  .blk .lbl{border:none;background:none;font-family:var(--f-body);font-size:14px;color:var(--ink);flex:1;min-width:0;padding:0;outline:none}
  .blk .catsel{flex:none;max-width:120px;font-size:11.5px;font-weight:600;color:var(--d-run);background:var(--d-run-s);border:1px solid transparent;border-radius:7px;padding:4px 6px;cursor:pointer}
  .blkacts{display:flex;align-items:center;gap:2px}
  .reord{display:inline-flex;flex-direction:column;margin-right:2px}
  .rbtn{border:none;background:none;color:var(--ink-faint);cursor:pointer;font-size:11px;line-height:.9;padding:0 3px}
  .rbtn:hover:not(:disabled){color:var(--navy)}
  .rbtn:disabled{opacity:.25;cursor:default}
  .blk .tick{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line-strong);background:var(--surface);cursor:pointer;flex:none;color:transparent;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.12s}
  .blk .tick:hover{border-color:var(--d-run)}
  .blk .rm{border:none;background:none;color:var(--ink-faint);font-size:17px;cursor:pointer;padding:2px 5px;border-radius:6px;flex:none}
  .blk .rm:hover{color:var(--danger);background:var(--d-race-s)}
  .blk.done .main{opacity:.5}
  .blk.done .lbl{text-decoration:line-through;color:var(--ink-soft)}
  .blk.done .tick{background:var(--d-run);border-color:var(--d-run);color:#fff}
  .typepop{position:absolute;top:calc(100% + 4px);left:0;z-index:20;background:var(--surface);border:1px solid var(--line-strong);border-radius:10px;box-shadow:0 6px 22px rgba(20,32,58,.16);padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:3px;min-width:200px}
  .typepop button{display:flex;align-items:center;gap:7px;border:none;background:none;border-radius:7px;padding:7px 9px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;font-family:var(--f-body)}
  .typepop button:hover{background:var(--surface-2)}
  .typepop button.on{background:var(--surface-2)}
  .typepop .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .addblk{margin-top:8px;background:none;border:1px dashed var(--line-strong);color:var(--ink-soft);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:500;cursor:pointer;width:100%}
  .addblk:hover{border-color:var(--navy);color:var(--navy)}
  .habedit{display:flex;gap:8px;margin-top:7px;align-items:center}
  .habedit input{flex:1}
  .scopebtn{border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-soft);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex:none}
  .scopebtn:hover{border-color:var(--navy);color:var(--navy)}
  .hchip.offduty{opacity:.5}
  .hchip .off{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-faint);border:1px solid var(--line);border-radius:4px;padding:1px 4px;margin-left:2px}
  /* ---- quota ---- */
  .q-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:11px 2px;border-bottom:1px solid var(--line)}
  .q-row:last-child{border-bottom:none}
  .q-row .lb{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .q-row .lb .tag{width:8px;height:8px;border-radius:2px;flex:none}
  .q-row .ct{font-family:var(--f-mono);font-size:13px;color:var(--ink-soft);white-space:nowrap}
  .routine{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 13px}
  .routine summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft)}
  /* ================= DASHBOARD ================= */
  .dash{display:flex;flex-direction:column;gap:12px}
  .dash-hero{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
    background:linear-gradient(135deg,var(--surface) 0%,var(--surface-2) 100%);padding:20px 24px}
  .dh-greet{font-family:var(--f-display);font-weight:500;font-size:clamp(22px,4vw,30px);letter-spacing:-.01em;line-height:1.05}
  .dh-date{color:var(--ink-soft);font-size:13.5px;margin-top:3px}
  .dh-phase{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
  .dh-phase .dot{width:8px;height:8px;border-radius:50%;flex:none}
  .dh-r{text-align:right;flex:none}
  .dh-r .big{font-family:var(--f-mono);font-weight:600;font-size:clamp(34px,8vw,50px);line-height:.92;color:var(--navy)}
  .dh-r .big .slash{font-size:.5em;color:var(--ink-faint)}
  .dh-r .lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-top:5px}

  .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .dcard{cursor:pointer;transition:transform .14s,box-shadow .14s,border-color .14s;padding:16px 18px;overflow:hidden;position:relative}
  .dcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dc-accent,var(--navy))}
  .dcard.dc-training{--dc-accent:var(--d-run)}
  .dcard.dc-money{--dc-accent:var(--buffer)}
  .dcard.dc-calendar{--dc-accent:var(--navy)}
  .dcard.dc-habit{--dc-accent:var(--gold)}
  .dcard:hover{transform:translateY(-2px);box-shadow:var(--shadow),0 10px 28px rgba(20,32,58,.10);border-color:var(--line-strong)}

const Store={
  async get(k){
    if(typeof window!=="undefined" && window.storage && window.storage.get){
      try{const r=await window.storage.get(k);return r?r.value:null}catch(e){/* key may not exist */}
    }

  },

/* =====================================================================
   CLOUD SYNC (Route C) — one private endpoint is the source of truth,
   localStorage stays as the offline cache. Endpoint speaks two verbs:
     GET  {endpoint}  (Bearer token)            -> 200 state JSON | 204 empty
     PUT  {endpoint}  (Bearer token, JSON body) -> 200

   ===================================================================== */
const SYNC_KEY="compound-sync";
let syncCfg={endpoint:"",token:"",enabled:false};
let syncStatus="off";   // off | idle | syncing | offline | error | conflict

function loadSyncCfg(){try{const r=localStorage.getItem(SYNC_KEY);if(r)syncCfg=Object.assign(syncCfg,JSON.parse(r))}catch(e){}}

function syncOn(){return syncCfg.enabled&&!!syncCfg.endpoint}

async function cloudFetch(method,body){
  const ctrl=new AbortController();const to=setTimeout(()=>ctrl.abort(),9000);
  try{
    const res=await fetch(syncCfg.endpoint,{method,
      headers:{"authorization":"Bearer "+syncCfg.token,"content-type":"application/json"},
      body,signal:ctrl.signal});
    clearTimeout(to);return res;
  }catch(e){clearTimeout(to);throw e}
}
async function cloudPull(){
  const res=await cloudFetch("GET");
  if(res.status===401||res.status===403)throw new Error("auth");
  if(res.status===204)return null;
  if(!res.ok)throw new Error("http"+res.status);
  const txt=await res.text();if(!txt.trim())return null;
  return JSON.parse(txt);
}
async function cloudPush(){
  const res=await cloudFetch("PUT",JSON.stringify(state));
  if(res.status===401||res.status===403)throw new Error("auth");
  if(!res.ok)throw new Error("http"+res.status);
  syncedRev=state.meta.rev;lastSync=Date.now();
}
function setSync(st,msg){syncStatus=st;if(msg!==undefined)syncMsg=msg;updateSyncPill()}

async function syncOnLoad(){
  if(!syncOn()){setSync("off");return}
  setSync("syncing");
  try{
    const remote=await cloudPull();
    if(remote&&remote.meta&&(remote.meta.rev||0)>(state.meta.rev||0)){
      state=runMigrations(deepMerge(clone(DEFAULTS),remote));
      module_=state.ui.module||module_;
      await save({push:false,bump:false});
      render();
    }else if(!remote||(state.meta.rev||0)>(remote.meta&&remote.meta.rev||-1)){
      await cloudPush();
    }
    syncedRev=state.meta.rev;lastSync=Date.now();setSync("idle");
  }catch(e){setSync(e.message==="auth"?"error":"offline")}
}

function schedulePush(){
  if(!syncOn())return;
  clearTimeout(pushTimer);setSync("syncing");
  pushTimer=setTimeout(async()=>{
    try{
      const remote=await cloudPull();
      const rr=remote&&remote.meta?remote.meta.rev||0:-1;
      if(rr>syncedRev&&rr!==state.meta.rev){ onSyncConflict(remote); return; }
      await cloudPush();setSync("idle");
    }catch(e){setSync(e.message==="auth"?"error":"offline")}
  },1200);
}
function onSyncConflict(remote){
  setSync("conflict");
  const keepMine=confirm("Sync conflict: Compound was changed on another device since this one last synced.\n\nOK  = keep THIS device's version (overwrite the other)\nCancel = load the other device's version (discard this device's unsynced changes)");
  if(keepMine){
    state.meta.rev=Math.max(state.meta.rev,(remote.meta&&remote.meta.rev||0)+1);
    cloudPush().then(()=>setSync("idle")).catch(()=>setSync("offline"));
  }else{
    state=runMigrations(deepMerge(clone(DEFAULTS),remote));
    module_=state.ui.module||module_;syncedRev=state.meta.rev;
    save({push:false,bump:false}).then(()=>{setSync("idle");render()});
  }
}
async function syncNow(){
  if(!syncOn()){setSync("off");return}
  setSync("syncing");
  try{
    const remote=await cloudPull();
    if(remote&&remote.meta&&(remote.meta.rev||0)>(state.meta.rev||0)){
      state=runMigrations(deepMerge(clone(DEFAULTS),remote));module_=state.ui.module||module_;
      await save({push:false,bump:false});render();
    }else{ await cloudPush(); }
    syncedRev=state.meta.rev;lastSync=Date.now();setSync("idle");render();
  }catch(e){setSync(e.message==="auth"?"error":"offline")}
}

async function save(opts){
  const push=!opts||opts.push!==false;
  const bump=!opts||opts.bump!==false;
  state.schemaVersion=SCHEMA_VERSION;
  if(!state.meta)state.meta={rev:0,updatedAt:0};
  if(bump){state.meta.rev=(state.meta.rev||0)+1;state.meta.updatedAt=Date.now()}
  await Store.set(KEY,JSON.stringify(state));

}
const MIGRATIONS={
  /* v1 -> v2: phases, habits, calendar, quota, body log, planned/unplanned spends */
  2:(s)=>{ (s.money.spend||[]).forEach(x=>{ if(x.planned===undefined) x.planned=true; }); return s; },
  /* v2 -> v3: block objects gain time/done/cat + type remap; habits gain scope; templates array */
  3:(s)=>{
    const C=s.calendar||{};
    Object.values(C.weeks||{}).forEach(wk=>(wk.days||[]).forEach(day=>{
      (day.blocks||[]).forEach(b=>{
        if(b.time===undefined)b.time="";
        if(b.done===undefined)b.done=false;
        if(b.type==="other")b.type="personal";
        if(!["work","training","faith","break","personal","meal"].includes(b.type))b.type="work";
        if(b.cat===undefined)b.cat="";
      });
    }));
    if(!Array.isArray(C.templates))C.templates=[];
    (s.habits&&s.habits.list||[]).forEach(h=>{
      if(h.scope===undefined)h.scope=(h.id==="h1"||h.id==="h7")?"weekday":"all";
    });
    return s;
  },
  /* v3 -> v4: sync metadata */
  4:(s)=>{ if(!s.meta)s.meta={rev:0,updatedAt:0}; return s; },
  /* v4 -> v5: seed the focused calendar templates without replacing user data */
  5:(s)=>{
    if(!s.calendar)s.calendar={weeks:{},templates:[]};
    if(!Array.isArray(s.calendar.templates))s.calendar.templates=[];
    const existing=new Set(s.calendar.templates.map(t=>t.id));
    CALENDAR_TEMPLATE_SEEDS.forEach(t=>{if(!existing.has(t.id))s.calendar.templates.push(clone(t))});
    const oldMorning="Morning routine: start slow — shower, fresh air, hydrate, me time, then work early. Earlier wake-ups are the goal.";
    const oldMbe="MBE responsibility can override anything planned below.";
    if(!s.calendar.morningNote||s.calendar.morningNote===oldMorning)
      s.calendar.morningNote="07:00–08:00 slow start — fresh air / sunlight, water and coffee. Start focused work at 08:30; earlier wake-ups are the longer-term goal.";
    if(!s.calendar.mbeNote||s.calendar.mbeNote===oldMbe)
      s.calendar.mbeNote="MBE work takes priority whenever required. Reallocate the current work block and resume the highest-value planned task at the next available slot.";
    return s;
  }
};
function runMigrations(s){
  let v=s.schemaVersion||1;
  while(v<SCHEMA_VERSION){v++;if(MIGRATIONS[v])s=MIGRATIONS[v](s);s.schemaVersion=v}
  return s;
}
function deepMerge(base,over){
  if(Array.isArray(base)||Array.isArray(over)||typeof base!=="object"||typeof over!=="object"||!base||!over)return over!==undefined?over:base;
  const out={...base};
  for(const k of Object.keys(over))out[k]=deepMerge(base[k],over[k]);
  return out;
}

async function load(){
  loadSyncCfg();
  const raw=await Store.get(KEY);
  if(raw){
    try{
      const parsed=JSON.parse(raw);
      const wasBehind=(parsed.schemaVersion||1)<SCHEMA_VERSION;
      state=runMigrations(deepMerge(clone(DEFAULTS),parsed));
      if(wasBehind)await save();   // persist the upgraded shape immediately
    }
    catch(e){state=clone(DEFAULTS)}
  }else{
    /* first run of the combined app: pull in the old standalone data */
    state=clone(DEFAULTS);
    if(SEED_DATA){
      /* first open of this enhanced build: import the exported backup baked in below */
      state=runMigrations(deepMerge(clone(DEFAULTS),clone(SEED_DATA)));
    }else{
      /* first run of the combined app: pull in the old standalone data */
      try{const ot=await Store.get(OLD_TRAINING_KEY);if(ot)state.training=migrateOldTraining(state.training,JSON.parse(ot))}catch(e){}
      try{const om=await Store.get(OLD_MONEY_KEY);if(om)state.money=migrateOldMoney(state.money,JSON.parse(om))}catch(e){}
      try{const ot=localStorage.getItem(OLD_TRAINING_KEY);if(ot&&!state.training.gymLog.length&&!Object.keys(state.training.schedule).length)state.training=migrateOldTraining(state.training,JSON.parse(ot))}catch(e){}
      try{const om=localStorage.getItem(OLD_MONEY_KEY);if(om&&!state.money.paychecks.length&&!state.money.buckets.length)state.money=migrateOldMoney(state.money,JSON.parse(om))}catch(e){}
    }
    await save();
  }
  module_=state.ui.module||"training";
  viewWk=currentWkIdx();
  render();
  loadSyncCfg();
  if(syncOn())syncOnLoad();
}

function syncPillText(){
  const ago=lastSync?Math.round((Date.now()-lastSync)/60000):null;
  const when=lastSync?(ago<1?"just now":ago+"m ago"):"";
  switch(syncStatus){
    case "idle":return {t:"● Synced"+(when?" · "+when:""),c:"ok"};
    case "syncing":return {t:"◍ Syncing…",c:"busy"};
    case "offline":return {t:"○ Offline — local only",c:"warn"};
    case "error":return {t:"✕ Sync error — check token",c:"err"};
    case "conflict":return {t:"! Sync conflict",c:"err"};
    default:return {t:"○ Sync off",c:"off"};
  }
}
function updateSyncPill(){
  const p=document.getElementById("syncPill");if(!p)return;
  const {t,c}=syncPillText();p.textContent=t;p.className="syncpill "+c;
}

function buildSyncPanel(host){
  if(!host)return;
  const panel=el(`<div class="card sync-card">
    <h2>Cloud sync</h2>
    <p class="lead">Point Compound at your own private endpoint and every device that shares it stays in sync. Data still works offline — it caches on the device and pushes when you're back online.</p>
    <div class="grid2">
      <div><label class="fld">Endpoint URL</label><input type="text" id="syncEndpoint" placeholder="https://compound-sync.you.workers.dev" value="${esc(syncCfg.endpoint)}"></div>
      <div><label class="fld">Access token</label><input type="text" id="syncToken" placeholder="the token you set on the worker" value="${esc(syncCfg.token)}"></div>
    </div>
    <label class="flagrow" style="margin-top:14px;display:flex;align-items:center;gap:9px;font-size:14px;cursor:pointer">
      <input type="checkbox" id="syncEnabled" ${syncCfg.enabled?"checked":""} style="width:17px;height:17px"> Keep this device in sync
    </label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">
      <button class="btn" id="syncSave" style="margin-top:0;width:auto;padding:11px 18px">Save &amp; connect</button>
      <button class="smallbtn" id="syncTest">Test connection</button>
      <button class="smallbtn" id="syncNowBtn">Sync now</button>
      <button class="smallbtn danger" id="syncOff">Disconnect</button>
    </div>
    <div id="syncResult" style="font-size:13px;margin-top:12px;min-height:18px;color:var(--ink-soft)"></div>
    <details class="routine" style="margin-top:14px">
      <summary>How to create the endpoint (Cloudflare Worker + KV — free)</summary>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.6;margin-top:10px">
        <b>1.</b> At dash.cloudflare.com → Workers &amp; Pages → Create → Worker. Give it a name (e.g. compound-sync) and deploy the starter.<br>
        <b>2.</b> Edit code → paste the worker script (I'll give it to you) → Deploy. Its URL becomes your <b>Endpoint URL</b> above.<br>
        <b>3.</b> Storage &amp; Databases → KV → create a namespace. In the Worker's Settings → Variables → KV Namespace Bindings, bind it as <code>COMPOUND_KV</code>.<br>
        <b>4.</b> In Settings → Variables, add a Secret named <code>SYNC_TOKEN</code> — any long random string. Put that same string in <b>Access token</b> above.<br>
        <b>5.</b> Tick “keep in sync”, Save &amp; connect, then Test. Repeat steps only on the phone: same URL + token, tick sync. Done.<br>
        <span style="color:var(--ink-faint)">The token is what protects your data — anyone with the URL and token can read/write it, so keep both private and don't reuse the token elsewhere.</span>
      </div>
    </details>
  </div>`);
  const res=panel.querySelector("#syncResult");
  panel.querySelector("#syncSave").onclick=()=>{
    syncCfg.endpoint=panel.querySelector("#syncEndpoint").value.trim().replace(/\/$/,"");
    syncCfg.token=panel.querySelector("#syncToken").value.trim();
    syncCfg.enabled=panel.querySelector("#syncEnabled").checked;
    saveSyncCfg();
    if(syncOn()){res.textContent="Connecting…";syncOnLoad().then(()=>{res.textContent=syncStatus==="idle"?"Connected and synced ✓":syncStatus==="offline"?"Saved, but couldn't reach the endpoint — check the URL.":syncStatus==="error"?"Saved, but the token was rejected.":"Saved.";});}
    else{setSync("off");res.textContent="Saved. Sync is off for this device.";}
  };
  panel.querySelector("#syncTest").onclick=async()=>{
    const ep=panel.querySelector("#syncEndpoint").value.trim().replace(/\/$/,"");
    const tk=panel.querySelector("#syncToken").value.trim();
    if(!ep){res.textContent="Enter an endpoint URL first.";return}
    res.textContent="Testing…";
    const save0={...syncCfg};syncCfg.endpoint=ep;syncCfg.token=tk;
    try{await cloudPull();res.textContent="Reached the endpoint and the token works ✓";}
    catch(e){res.textContent=e.message==="auth"?"Reached it, but the token was rejected.":"Couldn't reach the endpoint — check the URL and that the worker is deployed.";}
    finally{Object.assign(syncCfg,save0);}
  };
  panel.querySelector("#syncNowBtn").onclick=()=>{if(!syncOn()){res.textContent="Turn sync on first.";return}res.textContent="Syncing…";syncNow().then(()=>res.textContent=syncStatus==="idle"?"Synced ✓":"Couldn't sync — "+syncStatus);};
  panel.querySelector("#syncOff").onclick=()=>{syncCfg.enabled=false;saveSyncCfg();setSync("off");res.textContent="Disconnected. Your data stays on this device.";};
  host.appendChild(panel);
}

/* ---------- backup (whole system) ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`compound-backup-${todayISO()}.json`;
  a.click();URL.revokeObjectURL(a.href);
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(d.gymLog||d.endLog){ /* old training-only backup */
      state.training=migrateOldTraining(clone(DEFAULTS.training),d);
    }else if(d.history||d.outgoings){ /* old money-only backup */
      state.money=migrateOldMoney(clone(DEFAULTS.money),d);
    }else{
      state=runMigrations(deepMerge(clone(DEFAULTS),d));
    }
    save();viewWk=currentWkIdx();render();
  }catch(e){alert("Couldn't read that file — make sure it's a backup exported from here (or one of the old trackers).")}};
  r.readAsText(f);
}

   {rx:"3 × 6–8",mv:[{nm:"Close-Grip Bench Press",k:"closegrip"},{nm:"Floor Press",k:"floorpress"},{nm:"Weighted Dips",k:"dips"}]},
   {rx:"3 × 5–8",mv:[{nm:"Weighted Chin-Up",k:"chinup"},{nm:"Neutral-Grip Chin-Up",k:"ngchinup"},{nm:"Bodyweight Chin-Up",k:"bwchinup"}]},
   {rx:"4 × 6–8",mv:[{nm:"Barbell Row",k:"bbrow"},{nm:"Pendlay Row",k:"pendlay"},{nm:"Chest-Supported Row",k:"csrow"}]},
   {rx:"3 × 10–15",mv:[{nm:"45° Back Extension",k:"backext"},{nm:"Hip Thrust",k:"hipthrust"},{nm:"Barbell Glute Bridge",k:"glutebridge"}]}]}
};
function keyFor(name){
  const n=(name||"").toLowerCase();
  if(/front squat/.test(n))return "frontsq";
  if(/romanian|rdl|stiff.?leg/.test(n))return "rdl";
  if(/back squat|high.?bar/.test(n))return "squat";
  if(/overhead|ohp|shoulder press/.test(n))return "ohp";
  if(/chin.?up/.test(n))return "chinup";
  if(/pull.?up/.test(n))return "pullup";
  if(/dip/.test(n))return "dips";
  if(/incline/.test(n))return "incline";
  if(/bench press|bench$/.test(n))return "bench";
  return "x_"+n.replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")||"x_custom";
}
const BOARD=[
 {k:"squat",label:"Back Squat",rx:"4 × 5",seed:90},
 {k:"frontsq",label:"Front Squat",rx:"3 × 5–8",seed:70},
 {k:"bench",label:"Bench Press",rx:"4 × 3–6",seed:100},
 {k:"ohp",label:"Overhead Press",rx:"4 × 3–6",seed:60},
 {k:"pullup",label:"Weighted Pull-Up",rx:"4 × 3–6",seed:0},
 {k:"chinup",label:"Weighted Chin-Up",rx:"3 × 4–8",seed:0},
 {k:"dips",label:"Weighted Dips",rx:"3 × 5–8",seed:0},
 {k:"rdl",label:"Romanian Deadlift",rx:"3 × 6–8",seed:0},
 {k:"incline",label:"Incline Bench",rx:"3 × 6–8",seed:0}
];

function dayISO(start,di){const d=new Date(start+"T00:00:00");d.setDate(d.getDate()+di);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function dayNum(start,di){const d=new Date(start+"T00:00:00");d.setDate(d.getDate()+di);return d.getDate()}
function currentWkIdx(){
  const t=todayISO();
  for(let i=0;i<SCHEDULE.length;i++){if(t>=SCHEDULE[i].start && t<=SCHEDULE[i].end)return i}
  if(t<SCHEDULE[0].start)return 0;
  return SCHEDULE.length-1;
}
function daysToRace(){
  const ms=new Date(RACE+"T00:00:00")-new Date(todayISO()+"T00:00:00");
  return Math.round(ms/86400000);
}
function isTrainable(d){return !["rest","holiday"].includes(d)}
function bestFor(k){
  const T=state.training;
  let b=T.seeds[k]!==undefined?T.seeds[k]:(BOARD.find(x=>x.k===k)||{}).seed||0;
  T.gymLog.forEach(g=>{
    if(g.exercises){g.exercises.forEach(e=>{if(e.k===k)e.lines.forEach(l=>{if(l.w>b)b=l.w})})}
    else if(g.sets){g.sets.forEach(s=>{if(s.k===k && s.w>b)b=s.w})}
  });
  return b;
}

function weekView(){
  const T=state.training;
  const w=SCHEDULE[viewWk], cw=currentWkIdx();
  const todayIdx=(new Date().getDay()+6)%7;
  const done=w.days.filter((d,di)=>isTrainable(d.disc)&&T.schedule[`${viewWk}-${di}`]==="done").length;
  const total=w.days.filter(d=>isTrainable(d.disc)).length;

  const card=el(`<div class="card">
    <div class="wk-head">
      <button class="navb" id="prevWk" ${viewWk===0?"disabled":""}>‹</button>
      <div style="text-align:center">

        <div class="block-pill"><span class="tag" style="width:8px;height:8px;border-radius:2px;background:var(--navy)"></span>${esc(w.block)} block</div>

    </div>
    <div style="font-size:12px;color:var(--ink-faint);margin-top:8px">✓ = you did the planned session · coloured dots = anything you logged that day, including extra sessions on rest days.</div>
  </div>`);

  const dc=card.querySelector("#days");
  w.days.forEach((d,di)=>{
    const meta=DISC[d.disc];
    const st=T.schedule[`${viewWk}-${di}`];
    const isToday=(viewWk===cw && di===todayIdx);
    const iso=dayISO(w.start,di);
    const acts=[
      ...T.gymLog.filter(g=>g.date===iso).map(g=>({disc:"gym",label:g.day,sum:g.notes||""})),
      ...T.endLog.filter(e=>e.date===iso).map(e=>({disc:e.disc.toLowerCase(),label:`${e.disc} · ${e.type}`,sum:[e.summary,e.time].filter(Boolean).join(" · ")}))
    ];
    const actHTML=acts.length?`<div class="acts">${acts.map(a=>{const am=DISC[a.disc]||DISC.gym;
      return `<span class="act-chip" style="color:var(${am.v});background:var(${am.s})" title="${esc(a.sum)}">${esc(a.label)}</span>`}).join("")}</div>`:"";
    const row=el(`<div class="day ${isToday?"today":""}" style="border-left-color:var(${meta.v})">
      <div class="dn">${DAYS[di]}<span class="num">${dayNum(w.start,di)}</span></div>
      <div class="body">
        <div class="ttl" style="color:var(${meta.v});font-size:16px">${d.disc==="race"?"Race day 🏁":meta.label}</div>
        <div class="det">${esc(d.t)}${d.x?` — ${esc(d.x)}`:""}</div>
        ${actHTML}
      </div>
      <div class="marks">
        ${isTrainable(d.disc)?`
          <button class="mk done ${st==="done"?"on":""}" title="Did the planned session">✓</button>
          <button class="mk miss ${st==="missed"?"on":""}" title="Missed">✕</button>`:`<span style="font-size:11px;color:var(--ink-faint)">—</span>`}
      </div>
    </div>`);
    if(isTrainable(d.disc)){
      const [bd,bm]=row.querySelectorAll(".mk");
      bd.onclick=()=>{toggleTick(`${viewWk}-${di}`,"done")};
      bm.onclick=()=>{toggleTick(`${viewWk}-${di}`,"missed")};
    }
    dc.appendChild(row);
  });

  const mobSt=T.schedule[`${viewWk}-mob`];
  const mobDone=T.mobLog.filter(m=>m.date>=w.start && m.date<=w.end);
  const mobChips=mobDone.length?`<div class="acts">${mobDone.map(m=>`<span class="act-chip" style="color:var(--d-mob);background:var(--d-mob-s)" title="${esc([m.focus,m.dur?m.dur+"min":""].filter(Boolean).join(" · "))}">${esc(fmtDate(m.date))}${m.focus?" · "+esc(m.focus):""}</span>`).join("")}</div>`:"";
  const mob=el(`<div class="day mobweek" style="border-left-color:var(--d-mob)">
    <div class="dn" style="color:var(--d-mob)">WK<span class="num" style="color:var(--d-mob)">◇</span></div>
    <div class="body">
      <div class="ttl" style="color:var(--d-mob);font-size:16px">Mobility <span style="font-weight:400;font-size:12px;color:var(--ink-faint)">· weekly, any day</span></div>
      ${mobChips}
    </div>
    <div class="marks">
      <button class="mk done ${mobSt==="done"?"on":""}" title="Did the weekly mobility session">✓</button>
      <button class="mk miss ${mobSt==="missed"?"on":""}" title="Skipped">✕</button>
    </div>
  </div>`);
  const [mbd,mbm]=mob.querySelectorAll(".mk");
  mbd.onclick=()=>toggleTick(`${viewWk}-mob`,"done");
  mbm.onclick=()=>toggleTick(`${viewWk}-mob`,"missed");
  card.querySelector("#mobItem").appendChild(mob);

  card.querySelector("#prevWk").onclick=()=>{if(viewWk>0){viewWk--;render()}};
  card.querySelector("#nextWk").onclick=()=>{if(viewWk<SCHEDULE.length-1){viewWk++;render()}};
  const j=card.querySelector("#jumpNow");if(j)j.onclick=()=>{viewWk=cw;render()};
  return card;
}
function toggleTick(key,val){
  const T=state.training;
  T.schedule[key]=T.schedule[key]===val?undefined:val;
  if(T.schedule[key]===undefined)delete T.schedule[key];
  save();render();
}

function gymForm(){
  const T=state.training;

  const box=el(`<div>

  box.querySelectorAll(".pick[data-d]").forEach(b=>b.onclick=()=>{logDay=b.dataset.d;render()});

  tpl.slots.forEach((slot,si)=>{
    const opts=slot.mv.map((m,i)=>`<option value="${i}">${esc(m.nm)}${i>0?" (alt)":""}</option>`).join("")+`<option value="other">Other movement…</option>`;
    const base=lastSummary(slot.mv[0].k);
    const block=el(`<div class="ex-block" data-si="${si}">

      <div class="qk-last" style="margin:2px 0 9px">${baseHTML(base)}</div>
      <div class="lines"></div>
      <button class="add-line" type="button">+ weight change</button>
    </div>`);
    const lines=block.querySelector(".lines");
    lines.appendChild(setLine(null, base&&base.top?base.top.s:"", base&&base.top?base.top.r:"", base&&base.top?base.top.w:""));
    block.querySelector(".add-line").onclick=()=>lines.appendChild(setLine());
    const sel=block.querySelector(".ex-swap"), custom=block.querySelector(".ex-custom");
    sel.onchange=()=>{const other=sel.value==="other";custom.classList.toggle("hidden",!other);if(other)custom.focus();
      block.querySelector(".qk-last").innerHTML=other?"Custom movement — enter your numbers.":baseHTML(lastSummary(slot.mv[+sel.value].k))};
    list.appendChild(block);
  });
  box.querySelector("#gSave").onclick=()=>{
    const date=box.querySelector("#gDate").value||todayISO();
    const exercises=[];
    box.querySelectorAll(".ex-block").forEach(block=>{
      const si=+block.dataset.si, slot=tpl.slots[si];
      const lns=[];
      block.querySelectorAll(".set-line").forEach(row=>{
        const s=parseInt(row.querySelector(".ls").value);
        const r=row.querySelector(".lr").value.trim();
        const w=parseFloat(row.querySelector(".lw").value);
        if(r||!isNaN(w)){lns.push({s:isNaN(s)?1:s,r,w:isNaN(w)?0:w})}
      });
      if(!lns.length)return;
      const sel=block.querySelector(".ex-swap");
      let nm,k;
      if(sel.value==="other"){nm=block.querySelector(".ex-custom").value.trim()||slot.mv[0].nm;k=keyFor(nm)}
      else{const m=slot.mv[+sel.value];nm=m.nm;k=m.k}
      exercises.push({k,nm,lines:lns});
    });
    if(!exercises.length){alert("Enter at least one set band.");return}
    T.gymLog.unshift({id:uid(),date,day:logDay,exercises,notes:box.querySelector("#gNotes").value.trim()});
    save();
    box.querySelector("#gOk").style.display="block";
    setTimeout(render,650);
  };
  return box;
}

  const feedCard=el(`<div class="card">

        else if(f.kind==="mob")T.mobLog=T.mobLog.filter(x=>x.id!==f.id);
        else T.endLog=T.endLog.filter(x=>x.id!==f.id);
